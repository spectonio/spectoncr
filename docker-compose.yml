# ============================================================================
# SpectonCR Local Development Stack
#
# Usage:
#   docker compose up -d          # Start all services
#   docker compose logs -f        # Tail logs
#   docker compose down -v        # Stop and remove volumes
#
# After startup:
#   docker login localhost:5000 -u admin -p admin
#   docker tag myimage:latest localhost:5000/demo/default/myimage:latest
#   docker push localhost:5000/demo/default/myimage:latest
# ============================================================================

services:
  # ── OCI Registry Service ──────────────────────────────────────────────────
  registry:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["specton-registry"]
    ports:
      - "5000:5000"   # Registry API
      - "9095:9090"   # Prometheus metrics (9090 used by kubepilot on host)
    environment:
      RUST_LOG: "info,specton_registry=debug,specton_common=debug"
      SPECTONCR_SERVER__LISTEN_ADDR: "0.0.0.0:5000"
      SPECTONCR_EXTERNAL_URL: "http://localhost:5000"
      SPECTONCR_AUTH_SERVICE_URL: "http://auth:5001"
      SPECTONCR_SERVER__METRICS_ADDR: "0.0.0.0:9090"
      SPECTONCR_AUTH__ISSUER: "spectoncr"
      SPECTONCR_AUTH__AUDIENCE: "spectoncr-registry"
      SPECTONCR_AUTH__SIGNING_ALGORITHM: "RS256"
      SPECTONCR_AUTH__VERIFICATION_KEY_PATH: "/etc/spectoncr/keys/public.pem"
      SPECTONCR_AUTH__TOKEN_TTL_SECONDS: "300"
      SPECTONCR_STORAGE__BACKEND: "filesystem"
      SPECTONCR_STORAGE__ROOT: "/var/lib/spectoncr/data"
      SPECTONCR_RATE_LIMIT__DEFAULT_RPS: "100"
      SPECTONCR_RATE_LIMIT__IP_RPS: "50"
      # Scanner backends
      SPECTONCR_SCANNER__ENABLED: "true"
      SPECTONCR_SCANNER__POSTGRES_URL: "postgres://spectoncr:spectoncr@postgres:5432/spectoncr"
      SPECTONCR_SCANNER__REDIS_URL: "redis://redis:6379"
      SPECTONCR_SCANNER__VULNDB: "specton"
      SPECTONCR_SCANNER__AI_ENABLED: "true"
      SPECTONCR_SCANNER__AI_ENDPOINT: "http://host.docker.internal:11434"
      SPECTONCR_SCANNER__AI_MODEL: "qwen2.5-coder:7b"
      # Webhook notifications to OpsAPI (uncomment to enable)
      # SPECTONCR_WEBHOOKS__ENABLED: "true"
      # SPECTONCR_WEBHOOKS__TIMEOUT_MS: "5000"
      # SPECTONCR_WEBHOOKS__MAX_RETRIES: "3"
    volumes:
      - registry-data:/var/lib/spectoncr/data
      - jwt-keys:/etc/spectoncr/keys:ro
    depends_on:
      auth:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - spectoncr

  # ── Auth / Token Service ──────────────────────────────────────────────────
  auth:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["specton-auth"]
    ports:
      - "5001:5001"   # Auth API
    environment:
      RUST_LOG: "info,specton_auth=debug,specton_common=debug"
      SPECTONCR_SERVER__AUTH_LISTEN_ADDR: "0.0.0.0:5001"
      SPECTONCR_AUTH__ISSUER: "spectoncr"
      SPECTONCR_AUTH__AUDIENCE: "spectoncr-registry"
      SPECTONCR_AUTH__SIGNING_ALGORITHM: "RS256"
      SPECTONCR_AUTH__SIGNING_KEY_PATH: "/etc/spectoncr/keys/private.pem"
      SPECTONCR_AUTH__VERIFICATION_KEY_PATH: "/etc/spectoncr/keys/public.pem"
      SPECTONCR_AUTH__TOKEN_TTL_SECONDS: "300"
      # Bootstrap admin credentials (development only -- password: "admin")
      SPECTONCR_AUTH__BOOTSTRAP_ADMIN__USERNAME: "admin"
      SPECTONCR_AUTH__BOOTSTRAP_ADMIN__PASSWORD_HASH: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"
      SPECTONCR_RATE_LIMIT__TOKEN_ISSUE_RPM: "60"
    volumes:
      - jwt-keys:/etc/spectoncr/keys
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - spectoncr

  # ── MinIO Object Storage ─────────────────────────────────────────────────
  # S3-compatible object storage for production-like setups.
  # Access the MinIO console at http://localhost:9001
  # To use: set SPECTONCR_STORAGE__BACKEND=minio and SPECTONCR_STORAGE__ROOT=spectoncr
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - spectoncr
    profiles:
      - minio

  # Creates the default bucket in MinIO on first startup.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set spectoncr http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing spectoncr/spectoncr;
      echo 'Bucket ready.';
      "
    networks:
      - spectoncr
    profiles:
      - minio

  # ── Postgres (scanner metadata: suppressions, audit log, image settings) ──
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: spectoncr
      POSTGRES_PASSWORD: spectoncr
      POSTGRES_DB: spectoncr
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spectoncr -d spectoncr"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks:
      - spectoncr

  # ── Redis (scanner ephemeral results, 1h TTL) ─────────────────────────────
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped
    networks:
      - spectoncr

  # ── Key Generator (init container) ────────────────────────────────────────
  # Generates RSA key pair for JWT signing on first run.
  keygen:
    image: alpine:3.20
    command:
      - /bin/sh
      - -c
      - |
        if [ ! -f /keys/private.pem ]; then
          apk add --no-cache openssl
          echo "Generating RSA 4096-bit key pair for JWT signing..."
          openssl genrsa -out /keys/private.pem 4096
          openssl rsa -in /keys/private.pem -pubout -out /keys/public.pem
          chmod 640 /keys/private.pem
          chmod 644 /keys/public.pem
          echo "Keys generated successfully."
        else
          echo "Keys already exist, skipping generation."
        fi
    volumes:
      - jwt-keys:/keys
    networks: []

volumes:
  registry-data:
    driver: local
  jwt-keys:
    driver: local
  minio-data:
    driver: local
  postgres-data:
    driver: local

networks:
  spectoncr:
    driver: bridge
