# ============================================================================
# NebulaCR Observability Stack — Prometheus + Grafana
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
#
# Then open:
#   - Prometheus: http://localhost:9091
#   - Grafana:    http://localhost:13002  (admin / admin)
#
# Port choice: Grafana's default 3000 is squatted by every Node-flavour
# project on a developer laptop. 13002 is in the registered/private
# range, unlikely to clash, and easy to remember next to the
# registry's 5000/5001/9090.
#
# Dashboards are auto-provisioned from deploy/observability/grafana/dashboards.
# Alert rules are auto-loaded from deploy/observability/prometheus/rules.
# ============================================================================

services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: nebulacr-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    ports:
      - "9091:9090"
    volumes:
      - ./deploy/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    depends_on:
      - registry
      - auth
    restart: unless-stopped
    networks:
      - nebulacr
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.3.1
    container_name: nebulacr-grafana
    ports:
      - "13002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: ""
      GF_FEATURE_TOGGLES_ENABLE: ""
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - nebulacr

volumes:
  prometheus-data:
  grafana-data:
