name: Publish to Docker Hub

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag override (default: edge)"
        required: false
        default: ""

env:
  DOCKERHUB_REPO: ${{ secrets.DOCKER_HUB_USERNAME }}/spectoncr
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: Build & Push Multi-Arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          TAGS=""
          GHCR_REPO="ghcr.io/${{ github.repository }}"

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            MAJOR_MINOR="${VERSION%.*}"
            TAGS="${DOCKERHUB_REPO}:${VERSION}"
            TAGS="${TAGS},${DOCKERHUB_REPO}:${MAJOR_MINOR}"
            TAGS="${TAGS},${DOCKERHUB_REPO}:latest"
            TAGS="${TAGS},${GHCR_REPO}:${VERSION}"
            TAGS="${TAGS},${GHCR_REPO}:${MAJOR_MINOR}"
            TAGS="${TAGS},${GHCR_REPO}:latest"
          elif [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAGS="${DOCKERHUB_REPO}:${{ github.event.inputs.tag }}"
            TAGS="${TAGS},${GHCR_REPO}:${{ github.event.inputs.tag }}"
          else
            SHA="${GITHUB_SHA::7}"
            TAGS="${DOCKERHUB_REPO}:edge"
            TAGS="${TAGS},${DOCKERHUB_REPO}:${SHA}"
            TAGS="${TAGS},${DOCKERHUB_REPO}:latest"
            TAGS="${TAGS},${GHCR_REPO}:edge"
            TAGS="${TAGS},${GHCR_REPO}:${SHA}"
            TAGS="${TAGS},${GHCR_REPO}:latest"
          fi

          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Tags: ${TAGS}"

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.DOCKERHUB_REPO }}:edge"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"
        if: github.ref == 'refs/heads/main'

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
          repository: ${{ env.DOCKERHUB_REPO }}
          readme-filepath: ./DOCKERHUB.md
        if: hashFiles('DOCKERHUB.md') != ''
