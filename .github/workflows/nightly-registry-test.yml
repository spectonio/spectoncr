name: "Nightly Registry Health Test"

# Comprehensive nightly test suite for SpectonCR registry.
# Tests: health, auth, push/pull (3-seg + 2-seg), pull-through cache,
# large image handling, catalog API, tag listing, metrics, dashboard, and mirror.
#
# Required GitHub Secrets:
#   SPECTONCR_USERNAME       - Registry username (e.g. "admin")
#   SPECTONCR_PASSWORD       - Registry password
#   SPECTONCR_REGISTRY       - Primary registry host (e.g. "acc-spectoncr.diytaxreturn.co.uk")
#   SPECTONCR_MIRROR         - Mirror registry host (e.g. "acc-spectoncr-mirror.diytaxreturn.co.uk")
#   SLACK_WEBHOOK_URL       - Slack incoming webhook URL for failure notifications

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

env:
  PRIMARY_EXTERNAL: ${{ secrets.SPECTONCR_REGISTRY }}
  MIRROR_EXTERNAL: ${{ secrets.SPECTONCR_MIRROR }}
  IMAGE_NAME: demo/default/nightly-test
  IMAGE_NAME_2SEG: nightly/test-2seg
  IMAGE_TAG: nightly-${{ github.run_number }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  registry-health-test:
    name: Registry Health Test
    runs-on: [self-hosted, k3s-internal]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Detect registry URL ─────────────────────────────────────
      - name: Resolve registry URLs
        run: |
          # Always use external URL for API calls (health, auth, status, catalog)
          echo "PRIMARY=${PRIMARY_EXTERNAL}" >> "$GITHUB_ENV"
          echo "PRIMARY_SCHEME=https" >> "$GITHUB_ENV"
          echo "MIRROR=${MIRROR_EXTERNAL}" >> "$GITHUB_ENV"

          # For Docker push/pull, detect if we can use the internal path
          # (avoids external proxy issues with large blobs)
          if curl -sf --max-time 3 http://spectoncr-registry.acc.svc.cluster.local:5000/health > /dev/null 2>&1; then
            echo "DOCKER_REGISTRY=spectoncr-registry.acc.svc.cluster.local:5000" >> "$GITHUB_ENV"
            echo "Using INTERNAL ClusterIP for Docker push/pull"
          else
            echo "DOCKER_REGISTRY=${PRIMARY_EXTERNAL}" >> "$GITHUB_ENV"
            echo "Using EXTERNAL registry for Docker push/pull"
          fi

      # ── Cleanup ────────────────────────────────────────────────
      - name: Cleanup old nightly images
        run: |
          docker images --filter "reference=*/${IMAGE_NAME}" --format '{{.Repository}}:{{.Tag}}' 2>/dev/null | \
            xargs -r docker rmi 2>/dev/null || true
          docker images --filter "reference=*/${IMAGE_NAME_2SEG}" --format '{{.Repository}}:{{.Tag}}' 2>/dev/null | \
            xargs -r docker rmi 2>/dev/null || true

      # ── Debug ───────────────────────────────────────────────────
      - name: Debug connectivity
        run: |
          echo "PRIMARY=${PRIMARY}"
          echo "MIRROR=${MIRROR}"
          echo "Testing primary..."
          curl -sv --connect-timeout 10 "${PRIMARY_SCHEME}://${PRIMARY}/v2/" 2>&1 | tail -5
          echo "Testing mirror..."
          curl -sv --connect-timeout 10 "${MIRROR}/v2/" 2>&1 | tail -5

      # ── Auth ──────────────────────────────────────────────────────
      - name: Authenticate to primary
        id: auth-primary
        run: |
          RESPONSE=$(curl -sf --connect-timeout 10 -u "${{ secrets.SPECTONCR_USERNAME }}:${{ secrets.SPECTONCR_PASSWORD }}" \
            "${PRIMARY_SCHEME}://${PRIMARY}/auth/token?service=spectoncr-registry" 2>&1) || {
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Auth endpoint unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          }
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=No token in response" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "result=PASS" >> "$GITHUB_OUTPUT"

      - name: Authenticate to mirror
        id: auth-mirror
        run: |
          RESPONSE=$(curl -sf --connect-timeout 10 -u "${{ secrets.SPECTONCR_USERNAME }}:${{ secrets.SPECTONCR_PASSWORD }}" \
            "${MIRROR}/auth/token?service=spectoncr-registry" 2>&1) || {
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Mirror auth unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          }
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=No token from mirror" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          echo "result=PASS" >> "$GITHUB_OUTPUT"

      # ── Health Checks ─────────────────────────────────────────────
      - name: Health check primary
        id: health-primary
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --connect-timeout 10 \
            "${PRIMARY_SCHEME}://${PRIMARY}/health" 2>&1) || STATUS="000"
          if [ "$STATUS" = "200" ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Primary /health returned $STATUS" >> "$GITHUB_OUTPUT"
          fi

      - name: Health check mirror
        id: health-mirror
        run: |
          STATUS=$(curl -so /dev/null -w "%{http_code}" --connect-timeout 10 \
            "${MIRROR}/health" 2>&1) || STATUS="000"
          if [ "$STATUS" = "200" ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Mirror /health returned $STATUS" >> "$GITHUB_OUTPUT"
          fi

      # ── V2 API Check ──────────────────────────────────────────────
      - name: Registry v2 API check
        id: v2-check
        run: |
          PRIMARY_V2=$(curl -sf --connect-timeout 10 "${PRIMARY_SCHEME}://${PRIMARY}/v2/" 2>&1) && P_OK=true || P_OK=false
          MIRROR_V2=$(curl -sf --connect-timeout 10 "${MIRROR}/v2/" 2>&1) && M_OK=true || M_OK=false
          if $P_OK && $M_OK; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Primary=$P_OK Mirror=$M_OK" >> "$GITHUB_OUTPUT"
          fi

      # ── Dashboard ──────────────────────────────────────────────────
      - name: Dashboard check
        id: dashboard-check
        run: |
          P_DASH=$(curl -so /dev/null -w "%{http_code}" --connect-timeout 10 "${PRIMARY_SCHEME}://${PRIMARY}/dashboard" 2>&1)
          M_DASH=$(curl -so /dev/null -w "%{http_code}" --connect-timeout 10 "${MIRROR}/dashboard" 2>&1) || M_DASH="000"
          if [ "$P_DASH" = "200" ]; then
            if [ "$M_DASH" = "200" ]; then
              echo "result=PASS" >> "$GITHUB_OUTPUT"
            else
              echo "result=WARN" >> "$GITHUB_OUTPUT"
              echo "error=Primary=$P_DASH Mirror=$M_DASH (mirror may use different URL)" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Primary=$P_DASH Mirror=$M_DASH" >> "$GITHUB_OUTPUT"
          fi

      # ── Metrics ────────────────────────────────────────────────────
      - name: Metrics endpoint check
        id: metrics-check
        run: |
          METRICS=$(curl -sf --connect-timeout 10 "${PRIMARY_SCHEME}://${PRIMARY}/metrics" 2>&1) || {
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Metrics endpoint unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          }
          # Check for key metric names
          HAS_REQUESTS=$(echo "$METRICS" | grep -c 'registry_http_requests_total\|http_requests_total' || true)
          HAS_BLOBS=$(echo "$METRICS" | grep -c 'blob_upload_bytes\|storage_operations' || true)
          if [ "$HAS_REQUESTS" -gt 0 ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=WARN" >> "$GITHUB_OUTPUT"
            echo "error=Metrics returned but missing expected counters" >> "$GITHUB_OUTPUT"
          fi

      # ── HA Status ─────────────────────────────────────────────────
      - name: HA status check
        id: ha-check
        if: steps.auth-primary.outputs.result == 'PASS'
        run: |
          HA=$(curl -sf --connect-timeout 10 \
            -H "Authorization: Bearer ${{ steps.auth-primary.outputs.token }}" \
            "${PRIMARY_SCHEME}://${PRIMARY}/api/ha-status" 2>&1) || {
            echo "result=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          }
          ENABLED=$(echo "$HA" | jq -r '.ha_enabled // false')
          UNHEALTHY=$(echo "$HA" | jq '[.regions[]? | select(.healthy == false)] | length')
          if [ "$ENABLED" = "true" ] && [ "$UNHEALTHY" = "0" ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          elif [ "$ENABLED" = "true" ]; then
            echo "result=WARN" >> "$GITHUB_OUTPUT"
            echo "error=$UNHEALTHY unhealthy region(s)" >> "$GITHUB_OUTPUT"
          else
            echo "result=SKIP" >> "$GITHUB_OUTPUT"
          fi

      # ── Build & Push (3-segment) ──────────────────────────────────
      - name: Build test image
        id: build
        run: |
          echo "SpectonCR nightly test $(date -u +%Y-%m-%dT%H:%M:%SZ) run=${{ github.run_number }}" > /tmp/BUILD_INFO
          cp /tmp/BUILD_INFO /tmp/Dockerfile.info
          cat > /tmp/Dockerfile <<'DOCKERFILE'
          FROM scratch
          COPY Dockerfile.info /BUILD_INFO
          DOCKERFILE
          docker build -t "${DOCKER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" /tmp/
          echo "result=PASS" >> "$GITHUB_OUTPUT"

      - name: Docker login
        if: steps.auth-primary.outputs.result == 'PASS'
        run: |
          docker logout "${DOCKER_REGISTRY}" 2>/dev/null || true
          echo "${{ secrets.SPECTONCR_PASSWORD }}" | \
            docker login "${DOCKER_REGISTRY}" -u "${{ secrets.SPECTONCR_USERNAME }}" --password-stdin

      - name: Push image to primary (3-segment)
        id: push
        if: steps.auth-primary.outputs.result == 'PASS'
        run: |
          PUSH_OK=false
          for ATTEMPT in 1 2 3; do
            echo "Push attempt $ATTEMPT/3..."
            if docker push "${DOCKER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" 2>&1; then
              PUSH_OK=true
              break
            fi
            echo "Attempt $ATTEMPT failed"
            [ "$ATTEMPT" -lt 3 ] && sleep 5
          done
          if $PUSH_OK; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=docker push failed after 3 attempts" >> "$GITHUB_OUTPUT"
          fi

      # ── Image Status API ──────────────────────────────────────────
      - name: Check image status on primary
        id: status-primary
        if: steps.push.outputs.result == 'PASS'
        run: |
          RESPONSE=$(curl -sf --connect-timeout 10 \
            -H "Authorization: Bearer ${{ steps.auth-primary.outputs.token }}" \
            "${PRIMARY_SCHEME}://${PRIMARY}/v2/${IMAGE_NAME}/status/${IMAGE_TAG}" 2>&1) || {
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Status API unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          }
          AVAILABLE=$(echo "$RESPONSE" | jq -r '.available')
          if [ "$AVAILABLE" = "true" ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=available=false" >> "$GITHUB_OUTPUT"
          fi
          echo "$RESPONSE" | jq .

      # ── Pull & Verify ─────────────────────────────────────────────
      - name: Pull image from primary
        id: pull
        if: steps.push.outputs.result == 'PASS'
        run: |
          docker rmi "${DOCKER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" 2>/dev/null || true
          if docker pull "${DOCKER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" 2>&1; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=docker pull failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify pulled image
        id: verify
        if: steps.pull.outputs.result == 'PASS'
        run: |
          if docker inspect "${DOCKER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}" > /dev/null 2>&1; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Image inspect failed" >> "$GITHUB_OUTPUT"
          fi

      # ── 2-Segment Push/Pull ────────────────────────────────────────
      - name: Build 2-segment test image
        id: build-2seg
        run: |
          echo "SpectonCR 2-seg test $(date -u +%Y-%m-%dT%H:%M:%SZ) run=${{ github.run_number }}" > /tmp/BUILD_INFO_2SEG
          cat > /tmp/Dockerfile.2seg <<'DOCKERFILE'
          FROM scratch
          COPY BUILD_INFO_2SEG /BUILD_INFO
          DOCKERFILE
          docker build -t "${DOCKER_REGISTRY}/${IMAGE_NAME_2SEG}:${IMAGE_TAG}" -f /tmp/Dockerfile.2seg /tmp/
          echo "result=PASS" >> "$GITHUB_OUTPUT"

      - name: Push 2-segment image
        id: push-2seg
        if: steps.auth-primary.outputs.result == 'PASS'
        run: |
          PUSH_OK=false
          for ATTEMPT in 1 2 3; do
            echo "Push attempt $ATTEMPT/3 (2-segment)..."
            if docker push "${DOCKER_REGISTRY}/${IMAGE_NAME_2SEG}:${IMAGE_TAG}" 2>&1; then
              PUSH_OK=true
              break
            fi
            [ "$ATTEMPT" -lt 3 ] && sleep 5
          done
          if $PUSH_OK; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=2-segment push failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull 2-segment image
        id: pull-2seg
        if: steps.push-2seg.outputs.result == 'PASS'
        run: |
          docker rmi "${DOCKER_REGISTRY}/${IMAGE_NAME_2SEG}:${IMAGE_TAG}" 2>/dev/null || true
          if docker pull "${DOCKER_REGISTRY}/${IMAGE_NAME_2SEG}:${IMAGE_TAG}" 2>&1; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=2-segment pull failed" >> "$GITHUB_OUTPUT"
          fi

      # ── Pull-Through Cache Test ────────────────────────────────────
      # Pull a real Docker Hub image through SpectonCR's cache.
      # First pull goes to Docker Hub, second pull should be served from cache.
      - name: "Pull-through cache: fetch from Docker Hub via SpectonCR"
        id: cache-pull
        if: steps.auth-primary.outputs.result == 'PASS'
        run: |
          # Use bwalia/wslproxy as a real-world test image (~150MB)
          CACHE_IMAGE="${DOCKER_REGISTRY}/library/alpine:3.20"
          echo "Pulling ${CACHE_IMAGE} (should proxy from Docker Hub)..."
          docker rmi "${CACHE_IMAGE}" 2>/dev/null || true

          START=$(date +%s)
          if docker pull "${CACHE_IMAGE}" 2>&1; then
            ELAPSED=$(( $(date +%s) - START ))
            echo "First pull took ${ELAPSED}s (fetched from Docker Hub)"
            echo "first_pull_time=${ELAPSED}" >> "$GITHUB_OUTPUT"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Pull-through cache fetch failed" >> "$GITHUB_OUTPUT"
          fi

      - name: "Pull-through cache: verify cached (second pull)"
        id: cache-verify
        if: steps.cache-pull.outputs.result == 'PASS'
        run: |
          CACHE_IMAGE="${DOCKER_REGISTRY}/library/alpine:3.20"
          docker rmi "${CACHE_IMAGE}" 2>/dev/null || true

          START=$(date +%s)
          if docker pull "${CACHE_IMAGE}" 2>&1; then
            ELAPSED=$(( $(date +%s) - START ))
            echo "Second pull took ${ELAPSED}s (should be cached)"
            FIRST=${{ steps.cache-pull.outputs.first_pull_time }}
            if [ "$ELAPSED" -le "$FIRST" ] || [ "$ELAPSED" -le 10 ]; then
              echo "result=PASS" >> "$GITHUB_OUTPUT"
              echo "Cache working: second pull (${ELAPSED}s) <= first pull (${FIRST}s)"
            else
              echo "result=WARN" >> "$GITHUB_OUTPUT"
              echo "error=Second pull (${ELAPSED}s) slower than first (${FIRST}s)" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Cached pull failed" >> "$GITHUB_OUTPUT"
          fi

      - name: "Pull-through cache: large image (wslproxy ~150MB)"
        id: cache-large
        if: steps.auth-primary.outputs.result == 'PASS'
        run: |
          LARGE_IMAGE="${DOCKER_REGISTRY}/bwalia/wslproxy:latest"
          echo "Pulling ${LARGE_IMAGE} (large image, tests blob size handling)..."
          docker rmi "${LARGE_IMAGE}" 2>/dev/null || true

          START=$(date +%s)
          if docker pull "${LARGE_IMAGE}" 2>&1; then
            ELAPSED=$(( $(date +%s) - START ))
            SIZE=$(docker inspect "${LARGE_IMAGE}" --format '{{.Size}}' 2>/dev/null || echo 0)
            SIZE_MB=$(( SIZE / 1024 / 1024 ))
            echo "Pulled ${SIZE_MB}MB in ${ELAPSED}s"
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Large image pull-through failed" >> "$GITHUB_OUTPUT"
          fi

      # ── Catalog API ────────────────────────────────────────────────
      - name: Catalog API check
        id: catalog-check
        if: steps.auth-primary.outputs.result == 'PASS'
        run: |
          CATALOG=$(curl -sf --connect-timeout 10 \
            -H "Authorization: Bearer ${{ steps.auth-primary.outputs.token }}" \
            "${PRIMARY_SCHEME}://${PRIMARY}/v2/_catalog" 2>&1) || {
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Catalog API unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          }
          REPO_COUNT=$(echo "$CATALOG" | jq '.repositories | length')
          echo "Catalog has $REPO_COUNT repositories"
          echo "$CATALOG" | jq '.repositories[:10]'
          if [ "$REPO_COUNT" -gt 0 ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=WARN" >> "$GITHUB_OUTPUT"
            echo "error=Catalog empty (0 repositories)" >> "$GITHUB_OUTPUT"
          fi

      # ── Tag Listing ────────────────────────────────────────────────
      - name: Tag listing check
        id: tags-check
        if: steps.push.outputs.result == 'PASS' && steps.auth-primary.outputs.result == 'PASS'
        run: |
          TAGS=$(curl -sf --connect-timeout 10 \
            -H "Authorization: Bearer ${{ steps.auth-primary.outputs.token }}" \
            "${PRIMARY_SCHEME}://${PRIMARY}/v2/${IMAGE_NAME}/tags/list" 2>&1) || {
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Tags API unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          }
          TAG_COUNT=$(echo "$TAGS" | jq '.tags | length')
          HAS_OUR_TAG=$(echo "$TAGS" | jq --arg t "${IMAGE_TAG}" '.tags | index($t) != null')
          echo "Tags for ${IMAGE_NAME}: $TAG_COUNT total, our tag present: $HAS_OUR_TAG"
          echo "$TAGS" | jq .
          if [ "$HAS_OUR_TAG" = "true" ]; then
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "result=FAIL" >> "$GITHUB_OUTPUT"
            echo "error=Tag ${IMAGE_TAG} not found in listing" >> "$GITHUB_OUTPUT"
          fi

      # ── Mirror Replication ─────────────────────────────────────────
      - name: Check image on mirror (replication)
        id: status-mirror
        if: steps.push.outputs.result == 'PASS' && steps.auth-mirror.outputs.result == 'PASS'
        run: |
          echo "Waiting 15s for replication..."
          sleep 15
          RESPONSE=$(curl -sf --connect-timeout 10 \
            -H "Authorization: Bearer ${{ steps.auth-mirror.outputs.token }}" \
            "${MIRROR}/v2/${IMAGE_NAME}/status/${IMAGE_TAG}" 2>&1) || {
            echo "result=SKIP" >> "$GITHUB_OUTPUT"
            echo "error=Mirror status API unreachable" >> "$GITHUB_OUTPUT"
            exit 0
          }
          AVAILABLE=$(echo "$RESPONSE" | jq -r '.available')
          echo "Mirror available: $AVAILABLE"
          echo "$RESPONSE" | jq .
          echo "result=$( [ "$AVAILABLE" = "true" ] && echo PASS || echo INFO )" >> "$GITHUB_OUTPUT"

      # ── Cleanup ────────────────────────────────────────────────────
      - name: Docker logout
        if: always()
        run: |
          docker logout "${DOCKER_REGISTRY}" 2>/dev/null || true
          docker logout "${MIRROR}" 2>/dev/null || true

      # ── Report ─────────────────────────────────────────────────────
      - name: Collect results
        id: results
        if: always()
        run: |
          TESTS=0
          PASS=0
          FAIL=0
          REPORT=""

          check() {
            local name="$1" result="$2" error="$3"
            TESTS=$((TESTS + 1))
            if [ "$result" = "PASS" ]; then
              PASS=$((PASS + 1))
              REPORT="${REPORT}\n:white_check_mark: ${name}"
            elif [ "$result" = "FAIL" ]; then
              FAIL=$((FAIL + 1))
              REPORT="${REPORT}\n:x: ${name}: ${error}"
            elif [ "$result" = "WARN" ]; then
              PASS=$((PASS + 1))
              REPORT="${REPORT}\n:warning: ${name}: ${error}"
            else
              REPORT="${REPORT}\n:heavy_minus_sign: ${name}: skipped"
            fi
          }

          # Core health
          check "Primary auth"         "${{ steps.auth-primary.outputs.result }}"    "${{ steps.auth-primary.outputs.error }}"
          check "Mirror auth"          "${{ steps.auth-mirror.outputs.result }}"     "${{ steps.auth-mirror.outputs.error }}"
          check "Primary health"       "${{ steps.health-primary.outputs.result }}"  "${{ steps.health-primary.outputs.error }}"
          check "Mirror health"        "${{ steps.health-mirror.outputs.result }}"   "${{ steps.health-mirror.outputs.error }}"
          check "V2 API"               "${{ steps.v2-check.outputs.result }}"        "${{ steps.v2-check.outputs.error }}"
          check "Dashboard"            "${{ steps.dashboard-check.outputs.result }}" "${{ steps.dashboard-check.outputs.error }}"
          check "Metrics"              "${{ steps.metrics-check.outputs.result }}"   "${{ steps.metrics-check.outputs.error }}"
          check "HA status"            "${{ steps.ha-check.outputs.result }}"        "${{ steps.ha-check.outputs.error }}"

          # Push/pull (3-segment)
          check "Push (3-seg)"         "${{ steps.push.outputs.result }}"            "${{ steps.push.outputs.error }}"
          check "Image status API"     "${{ steps.status-primary.outputs.result }}"  "${{ steps.status-primary.outputs.error }}"
          check "Pull (3-seg)"         "${{ steps.pull.outputs.result }}"            "${{ steps.pull.outputs.error }}"
          check "Verify image"         "${{ steps.verify.outputs.result }}"          "${{ steps.verify.outputs.error }}"

          # Push/pull (2-segment)
          check "Push (2-seg)"         "${{ steps.push-2seg.outputs.result }}"       "${{ steps.push-2seg.outputs.error }}"
          check "Pull (2-seg)"         "${{ steps.pull-2seg.outputs.result }}"       "${{ steps.pull-2seg.outputs.error }}"

          # Pull-through cache
          check "Cache: alpine"        "${{ steps.cache-pull.outputs.result }}"      "${{ steps.cache-pull.outputs.error }}"
          check "Cache: verify"        "${{ steps.cache-verify.outputs.result }}"    "${{ steps.cache-verify.outputs.error }}"
          check "Cache: large image"   "${{ steps.cache-large.outputs.result }}"     "${{ steps.cache-large.outputs.error }}"

          # API features
          check "Catalog API"          "${{ steps.catalog-check.outputs.result }}"   "${{ steps.catalog-check.outputs.error }}"
          check "Tag listing"          "${{ steps.tags-check.outputs.result }}"      "${{ steps.tags-check.outputs.error }}"

          # Mirror replication
          check "Mirror replication"   "${{ steps.status-mirror.outputs.result }}"   "${{ steps.status-mirror.outputs.error }}"

          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          echo "pass=$PASS" >> "$GITHUB_OUTPUT"
          echo "fail=$FAIL" >> "$GITHUB_OUTPUT"

          echo -e "$REPORT" > /tmp/report.txt
          echo "has_failures=$( [ "$FAIL" -gt 0 ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

          echo "=== Test Results: ${PASS}/${TESTS} passed, ${FAIL} failed ==="
          echo -e "$REPORT"

      - name: Notify Slack on failure
        if: always() && steps.results.outputs.has_failures == 'true'
        run: |
          REPORT=$(cat /tmp/report.txt)
          PAYLOAD=$(cat <<SLACK
          {
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": ":rotating_light: SpectonCR Nightly Test FAILED",
                  "emoji": true
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Results:* ${{ steps.results.outputs.pass }}/${{ steps.results.outputs.tests }} passed, ${{ steps.results.outputs.fail }} failed"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${REPORT}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "Primary: \`${PRIMARY}\` | Mirror: \`${MIRROR}\` | Run #${{ github.run_number }}"
                  }
                ]
              }
            ]
          }
          SLACK
          )
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "$PAYLOAD" \
            "${{ secrets.SLACK_WEBHOOK_URL }}" || echo "::warning::Failed to send Slack notification"

      - name: Notify Slack on success (weekly summary)
        if: always() && steps.results.outputs.has_failures == 'false' && github.event.schedule != ''
        run: |
          if [ "$(date +%u)" = "1" ]; then
            curl -sf -X POST -H 'Content-type: application/json' \
              --data "{\"text\":\":white_check_mark: SpectonCR weekly health check passed — ${{ steps.results.outputs.pass }}/${{ steps.results.outputs.tests }} tests OK. Primary: \`${PRIMARY}\` Mirror: \`${MIRROR}\`\"}" \
              "${{ secrets.SLACK_WEBHOOK_URL }}" || true
          fi

      - name: Fail if tests failed
        if: always() && steps.results.outputs.has_failures == 'true'
        run: |
          echo "::error::${{ steps.results.outputs.fail }} test(s) failed"
          cat /tmp/report.txt
          exit 1
