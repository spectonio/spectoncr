name: Publish landing page

# Publishes docs/landing/** to two places on any main push touching
# the landing content:
#   1. s3://spectoncr-docs/landing/  (+ /index.html for the bucket root)
#   2. gh-pages:/landing/  (served via GitHub Pages at
#      https://bwalia.github.io/spectoncr/landing/)
#
# The two jobs run in parallel but share a concurrency group so a
# burst of commits doesn't race on the gh-pages branch (which
# chart-releaser also writes to from the Helm workflow).
#
# Required repo secrets:
#   AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — IAM user with
#     s3:PutObject / s3:PutObjectAcl on the spectoncr-docs bucket.

on:
  push:
    branches: [main]
    paths:
      - "docs/landing/**"
      - ".github/workflows/publish-landing.yml"
  workflow_dispatch:
    inputs:
      cache_control:
        description: "Cache-Control for uploaded objects"
        required: false
        default: "public, max-age=300"

concurrency:
  group: gh-pages-write
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-2
  BUCKET: spectoncr-docs
  PREFIX: landing

permissions:
  contents: write

jobs:
  publish-s3:
    name: Sync landing/ to S3
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Single-object PUT for the index to set the correct content-type +
      # cache-control; `sync` for any sibling assets (css, js, images)
      # without overwriting unchanged objects.
      - name: Upload index.html
        run: |
          aws s3 cp docs/landing/index.html \
            "s3://${BUCKET}/${PREFIX}/index.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "${{ github.event.inputs.cache_control || 'public, max-age=300' }}"

      - name: Sync remaining assets
        run: |
          # Exclude index.html (already uploaded with tuned headers).
          aws s3 sync docs/landing/ "s3://${BUCKET}/${PREFIX}/" \
            --exclude "index.html" \
            --delete \
            --cache-control "${{ github.event.inputs.cache_control || 'public, max-age=300' }}"

      - name: Report endpoint
        run: |
          echo "Object URL: https://${BUCKET}.s3.${AWS_REGION}.amazonaws.com/${PREFIX}/index.html"
          echo "Website   : http://${BUCKET}.s3-website.${AWS_REGION}.amazonaws.com/${PREFIX}/"

  publish-gh-pages:
    name: Publish landing/ to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      # `keep_files: true` preserves everything already on gh-pages
      # (Helm chart index.yaml + tarballs produced by chart-releaser);
      # `destination_dir: landing` scopes our writes so we don't clobber
      # the chart repo at the root.
      - name: Deploy to gh-pages:/landing
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/landing
          destination_dir: landing
          keep_files: true
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          commit_message: "publish landing/ from ${{ github.sha }}"

      - name: Report endpoint
        run: |
          echo "GitHub Pages: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/landing/"
