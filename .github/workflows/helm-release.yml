name: Helm Chart Release

on:
  push:
    branches: [main]
    paths:
      - "deploy/helm/nebulacr/**"

permissions:
  contents: write
  packages: write

jobs:
  release-gh-pages:
    name: Release to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Add Helm repos (if chart has dependencies)
        # chart-releaser-action runs `helm dep build` internally; that
        # only works if every dependency repo in Chart.yaml is already
        # registered in helm's config. Register the grafana repo
        # explicitly (Chart.yaml pulls in grafana 8.5.x) and prime
        # `charts/` so the action's build step is a no-op rather than
        # a fetch — see run 25966202371.
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm dependency update deploy/helm/nebulacr

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: deploy/helm
          pages_branch: gh-pages
          config: .github/cr-config.yml
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

  release-oci:
    name: Release to GHCR (OCI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Fetch chart dependencies
        # Chart.yaml depends on grafana 8.5.x; without this `helm
        # package` errors with `found in Chart.yaml, but missing in
        # charts/ directory: grafana` — see run 25966202371.
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update
          helm dependency update deploy/helm/nebulacr

      - name: Package chart
        run: helm package deploy/helm/nebulacr -d /tmp/helm-packages

      - name: Push chart to GHCR (OCI)
        run: helm push /tmp/helm-packages/nebulacr-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
