# ============================================================================
# GitHub Actions: Build and Push to SpectonCR (Zero-Trust OIDC Flow)
#
# This workflow demonstrates SpectonCR's zero-trust CI/CD integration:
#
#   1. GitHub mints a short-lived OIDC identity token (JWT) for this workflow
#   2. The workflow exchanges that JWT for a SpectonCR short-lived access token
#      via POST /auth/github-actions/token
#   3. The SpectonCR token is used for `docker login` and image push
#   4. Credentials are cleaned up regardless of success or failure
#
# Security properties:
#   - No long-lived secrets stored in GitHub (zero static credentials)
#   - SpectonCR access tokens expire after 5 minutes
#   - GitHub OIDC tokens are audience-bound and single-use
#   - Subject binding ensures only specific repos/branches can push
#   - Least-privilege: tokens are scoped to specific tenant/project/actions
#
# Prerequisites:
#   - Configure SpectonCR auth service to trust GitHub's OIDC issuer:
#       issuer_url = "https://token.actions.githubusercontent.com"
#       client_id  = "spectoncr"
#   - Create a tenant and project in SpectonCR
#   - Create an access policy binding the GitHub subject to a role:
#       subject = "repo:my-org/my-repo:ref:refs/heads/main"
#       role    = "push"    (or a custom role with pull+push)
#   - Ensure your SpectonCR auth endpoint is reachable from GitHub runners
#
# Token flow diagram:
#
#   GitHub Runner           GitHub OIDC Provider         SpectonCR Auth
#   ─────────────           ────────────────────         ─────────────
#        │                         │                          │
#        │──── Request OIDC JWT ──>│                          │
#        │<─── OIDC JWT ──────────│                          │
#        │                         │                          │
#        │──── POST /auth/github-actions/token ──────────────>│
#        │     (with OIDC JWT)     │                          │
#        │                         │     Validate JWT against │
#        │                         │<──── JWKS endpoint ─────│
#        │                         │──── Public keys ────────>│
#        │                         │                          │
#        │<──── Short-lived SpectonCR token ──────────────────│
#        │                         │                          │
#        │──── docker login (with SpectonCR token) ──────────>│
#        │──── docker push ─────────────────────────────────>│
#
# ============================================================================

name: Build and Push to SpectonCR

on:
  push:
    branches: [main]
    tags: ['v*']            # Also trigger on version tags
  pull_request:
    branches: [main]

# ---------------------------------------------------------------------------
# OIDC Permissions
# ---------------------------------------------------------------------------
# id-token: write   -- Required to request an OIDC JWT from GitHub's token
#                       service. Without this, the ACTIONS_ID_TOKEN_REQUEST_URL
#                       and ACTIONS_ID_TOKEN_REQUEST_TOKEN env vars are unset.
# contents: read     -- Required to check out the repository code.
# packages: none     -- We do NOT use GHCR; all images go to SpectonCR.
# ---------------------------------------------------------------------------
permissions:
  id-token: write
  contents: read

# ---------------------------------------------------------------------------
# Environment Variables
# ---------------------------------------------------------------------------
# These define the SpectonCR target. Override them in GitHub repository
# settings (Settings > Secrets and variables > Actions > Variables) for
# per-repo configuration without modifying the workflow file.
# ---------------------------------------------------------------------------
env:
  # SpectonCR registry endpoint (host:port for Docker protocol)
  SPECTONCR_REGISTRY: registry.example.com:5000
  # SpectonCR auth API endpoint (HTTPS for token exchange)
  SPECTONCR_AUTH_URL: https://auth.example.com:5001
  # Tenant and project scoping -- maps to SpectonCR's multi-tenancy model
  SPECTONCR_TENANT: my-org
  SPECTONCR_PROJECT: my-project
  # Image name (without registry prefix -- assembled in steps below)
  IMAGE_NAME: my-app

jobs:
  # ==========================================================================
  # Job: build-and-push
  #
  # Builds a multi-architecture Docker image and pushes it to SpectonCR.
  # Uses a matrix strategy to build linux/amd64 and linux/arm64 in parallel,
  # then creates a manifest list combining both architectures.
  # ==========================================================================
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false      # Don't cancel other arch builds if one fails
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      # ── Step 1: Check out source code ─────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Prepare build metadata ────────────────────────────────────
      # Generate Docker tags and labels based on Git metadata.
      # This ensures consistent tagging across all architectures.
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SPECTONCR_REGISTRY }}/${{ env.SPECTONCR_TENANT }}/${{ env.SPECTONCR_PROJECT }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag with full SHA for immutable reference
            type=sha,prefix=,format=long
            # Tag with short SHA for convenience
            type=sha,prefix=,format=short
            # Tag with branch name (e.g., "main")
            type=ref,event=branch
            # Tag with semver from Git tags (e.g., "v1.2.3" -> "1.2.3")
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Tag "latest" only on main branch pushes
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Step 3: Request OIDC identity token from GitHub ───────────────────
      # GitHub's OIDC provider mints a short-lived JWT that attests to the
      # identity of this workflow run. The JWT includes claims such as:
      #
      #   iss: "https://token.actions.githubusercontent.com"
      #   sub: "repo:my-org/my-repo:ref:refs/heads/main"
      #   aud: "spectoncr"
      #   repository: "my-org/my-repo"
      #   ref: "refs/heads/main"
      #   sha: "<commit-sha>"
      #   workflow: "Build and Push to SpectonCR"
      #   run_id: "12345678"
      #
      # The audience ("spectoncr") must match the client_id configured in the
      # SpectonCR OIDC provider settings. This prevents token misuse -- a JWT
      # minted for a different audience will be rejected.
      #
      # The ACTIONS_ID_TOKEN_REQUEST_URL and ACTIONS_ID_TOKEN_REQUEST_TOKEN
      # environment variables are injected by GitHub when id-token: write
      # permission is granted. They point to GitHub's internal token endpoint.
      - name: Get GitHub OIDC token
        id: github-oidc
        run: |
          echo "Requesting OIDC token from GitHub..."

          # Request the OIDC token with the "spectoncr" audience.
          # The audience parameter is appended as a query parameter.
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=spectoncr" \
            | jq -r '.value')

          # Validate that we received a token
          if [ -z "${OIDC_TOKEN}" ] || [ "${OIDC_TOKEN}" = "null" ]; then
            echo "::error::Failed to obtain OIDC token from GitHub. Ensure 'permissions: id-token: write' is set."
            exit 1
          fi

          # Mask the token in all subsequent log output. GitHub Actions will
          # replace any occurrence of this value with '***' in logs.
          echo "::add-mask::${OIDC_TOKEN}"
          echo "token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

          # Log non-sensitive metadata for debugging
          echo "OIDC token obtained successfully (length: ${#OIDC_TOKEN} chars)"

      # ── Step 4: Exchange GitHub OIDC token for SpectonCR access token ──────
      # This is the core of the zero-trust flow. We POST the GitHub OIDC JWT
      # to SpectonCR's dedicated GitHub Actions token endpoint:
      #
      #   POST /auth/github-actions/token
      #
      # SpectonCR's auth service performs the following validation:
      #   1. Decodes the JWT header to find the key ID (kid)
      #   2. Fetches GitHub's JWKS from:
      #      https://token.actions.githubusercontent.com/.well-known/jwks
      #   3. Validates the JWT signature using the matching public key
      #   4. Checks token expiry, audience, and issuer claims
      #   5. Matches the "sub" claim against configured access policies
      #   6. Issues a short-lived (default: 5 min) SpectonCR access token
      #      scoped to the requested tenant/project/repository/actions
      #
      # The scope block follows the principle of least privilege:
      #   - tenant:     organizational boundary
      #   - project:    logical grouping within a tenant
      #   - repository: specific image repository
      #   - actions:    "pull" and/or "push" (never "admin" in CI)
      - name: Authenticate to SpectonCR
        id: spectoncr-auth
        run: |
          echo "Exchanging GitHub OIDC token for SpectonCR access token..."

          # Determine the required actions based on the event type.
          # PRs only need pull (for build cache); pushes need pull+push.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ACTIONS='["pull"]'
          else
            ACTIONS='["pull", "push"]'
          fi

          # POST to the GitHub Actions-specific token endpoint.
          # This endpoint is optimized for GitHub's OIDC token format and
          # automatically extracts the repository, ref, and workflow claims.
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "${{ env.SPECTONCR_AUTH_URL }}/auth/github-actions/token" \
            -H "Content-Type: application/json" \
            -H "User-Agent: spectoncr-github-actions/1.0" \
            -d "{
              \"identity_token\": \"${{ steps.github-oidc.outputs.token }}\",
              \"scope\": {
                \"tenant\": \"${{ env.SPECTONCR_TENANT }}\",
                \"project\": \"${{ env.SPECTONCR_PROJECT }}\",
                \"repository\": \"${{ env.IMAGE_NAME }}\",
                \"actions\": ${ACTIONS}
              }
            }")

          # Separate HTTP status code from the response body
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')

          # Handle errors with actionable messages
          if [ "${HTTP_CODE}" != "200" ]; then
            ERROR_TYPE=$(echo "${BODY}" | jq -r '.error // "unknown"')
            ERROR_MSG=$(echo "${BODY}" | jq -r '.message // "No details available"')
            echo "::error::SpectonCR authentication failed (HTTP ${HTTP_CODE})"
            echo "::error::Error: ${ERROR_TYPE} - ${ERROR_MSG}"

            # Provide troubleshooting hints based on common error codes
            case "${HTTP_CODE}" in
              401) echo "::error::Hint: Check that the OIDC issuer is trusted in SpectonCR" ;;
              403) echo "::error::Hint: Check that this repo/branch is authorized in SpectonCR access policies" ;;
              404) echo "::error::Hint: Check SPECTONCR_AUTH_URL -- the /auth/github-actions/token endpoint may not exist" ;;
              422) echo "::error::Hint: Check scope parameters (tenant, project, repository)" ;;
            esac
            exit 1
          fi

          # Extract the short-lived access token
          ACCESS_TOKEN=$(echo "${BODY}" | jq -r '.token')
          if [ -z "${ACCESS_TOKEN}" ] || [ "${ACCESS_TOKEN}" = "null" ]; then
            echo "::error::SpectonCR returned 200 but no token in response body"
            exit 1
          fi

          # Mask the token so it never appears in workflow logs
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "${GITHUB_OUTPUT}"

          # Log non-sensitive response metadata
          EXPIRES_IN=$(echo "${BODY}" | jq -r '.expires_in // "unknown"')
          TOKEN_ID=$(echo "${BODY}" | jq -r '.token_id // "unknown"')
          echo "SpectonCR token obtained successfully"
          echo "  Token ID:    ${TOKEN_ID}"
          echo "  Expires in:  ${EXPIRES_IN}s"
          echo "  Scope:       ${{ env.SPECTONCR_TENANT }}/${{ env.SPECTONCR_PROJECT }}/${{ env.IMAGE_NAME }}"

      # ── Step 5: Docker login using the short-lived token ──────────────────
      # The SpectonCR access token is used as the password for `docker login`.
      # The username field is ignored by SpectonCR (the identity is embedded
      # in the JWT itself), but Docker requires a non-empty value, so we use
      # "github-actions" as a descriptive placeholder.
      #
      # The token is piped via stdin (--password-stdin) rather than passed as
      # a command-line argument. This prevents the token from appearing in
      # process listings (ps aux) or shell history.
      - name: Docker login to SpectonCR
        run: |
          echo "${{ steps.spectoncr-auth.outputs.token }}" | \
            docker login "${{ env.SPECTONCR_REGISTRY }}" \
              --username "github-actions" \
              --password-stdin
          echo "Docker login to SpectonCR successful"

      # ── Step 6: Set up Docker Buildx for multi-arch builds ────────────────
      # Buildx is Docker's extended build tool that supports:
      #   - Multi-platform builds via QEMU emulation
      #   - Build cache import/export (GitHub Actions cache)
      #   - Provenance attestations and SBOMs
      - name: Set up QEMU (for multi-arch emulation)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 7: Build and push the Docker image ───────────────────────────
      # Build for the matrix platform and push to SpectonCR. Each platform
      # build runs in parallel; the manifest-create job (below) combines them.
      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          # Push on main branch and version tags only; PRs only build
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache for Docker layers -- dramatically speeds up
          # subsequent builds by caching unchanged layers.
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max
          # Supply build arguments for provenance metadata
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ github.ref_name }}
          # OCI provenance attestation -- records build inputs and environment
          provenance: true
          # Software Bill of Materials -- lists all packages in the image
          sbom: true

      # ── Step 8: Export the image digest for the manifest job ──────────────
      - name: Export digest
        if: github.event_name == 'push'
        run: |
          echo "Platform: ${{ matrix.platform }}"
          echo "Digest:   ${{ steps.build.outputs.digest }}"
          # Save digest to a file for the manifest job to consume
          mkdir -p /tmp/digests
          PLATFORM_SAFE=$(echo "${{ matrix.platform }}" | tr '/' '-')
          echo "${{ steps.build.outputs.digest }}" > "/tmp/digests/${PLATFORM_SAFE}"

      - name: Upload digest artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ strategy.job-index }}
          path: /tmp/digests/*
          retention-days: 1

      # ── Step 9: Docker logout (cleanup) ───────────────────────────────────
      # Always remove credentials from the runner, even if previous steps
      # failed. The token is short-lived (5 min), but defense in depth means
      # we clean up regardless.
      - name: Docker logout (cleanup)
        if: always()
        run: |
          docker logout "${{ env.SPECTONCR_REGISTRY }}" 2>/dev/null || true
          # Also remove any Docker config files that may contain the token
          rm -f "${HOME}/.docker/config.json" 2>/dev/null || true
          echo "Credentials cleaned up"

  # ==========================================================================
  # Job: create-manifest
  #
  # After all platform builds complete, create a multi-arch manifest list
  # that allows `docker pull` to automatically select the right architecture.
  # ==========================================================================
  create-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'

    steps:
      - name: Download all digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Get GitHub OIDC token
        id: github-oidc
        run: |
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=spectoncr" \
            | jq -r '.value')
          echo "::add-mask::${OIDC_TOKEN}"
          echo "token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate to SpectonCR
        id: spectoncr-auth
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "${{ env.SPECTONCR_AUTH_URL }}/auth/github-actions/token" \
            -H "Content-Type: application/json" \
            -d "{
              \"identity_token\": \"${{ steps.github-oidc.outputs.token }}\",
              \"scope\": {
                \"tenant\": \"${{ env.SPECTONCR_TENANT }}\",
                \"project\": \"${{ env.SPECTONCR_PROJECT }}\",
                \"repository\": \"${{ env.IMAGE_NAME }}\",
                \"actions\": [\"pull\", \"push\"]
              }
            }")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::SpectonCR auth failed (HTTP ${HTTP_CODE})"
            exit 1
          fi
          ACCESS_TOKEN=$(echo "${BODY}" | jq -r '.token')
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Docker login to SpectonCR
        run: |
          echo "${{ steps.spectoncr-auth.outputs.token }}" | \
            docker login "${{ env.SPECTONCR_REGISTRY }}" \
              --username "github-actions" \
              --password-stdin

      - name: Create and push manifest list
        run: |
          IMAGE_BASE="${{ env.SPECTONCR_REGISTRY }}/${{ env.SPECTONCR_TENANT }}/${{ env.SPECTONCR_PROJECT }}/${{ env.IMAGE_NAME }}"

          # Read digests from all platform builds
          DIGESTS=""
          for f in /tmp/digests/*; do
            DIGEST=$(cat "$f")
            DIGESTS="${DIGESTS} ${IMAGE_BASE}@${DIGEST}"
          done

          # Create manifest list for each tag
          for TAG in "${{ github.sha }}" "latest"; do
            docker manifest create "${IMAGE_BASE}:${TAG}" ${DIGESTS}
            docker manifest push "${IMAGE_BASE}:${TAG}"
            echo "Manifest pushed: ${IMAGE_BASE}:${TAG}"
          done

      - name: Docker logout (cleanup)
        if: always()
        run: |
          docker logout "${{ env.SPECTONCR_REGISTRY }}" 2>/dev/null || true
          rm -f "${HOME}/.docker/config.json" 2>/dev/null || true

  # ==========================================================================
  # Job: scan
  #
  # Scan the pushed image for known vulnerabilities using Trivy.
  # This runs after the image is pushed to ensure we scan the exact image
  # that will be deployed (not just a local build artifact).
  # ==========================================================================
  scan:
    runs-on: ubuntu-latest
    needs: create-manifest
    if: github.event_name == 'push'

    steps:
      - name: Get GitHub OIDC token
        id: github-oidc
        run: |
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=spectoncr" \
            | jq -r '.value')
          echo "::add-mask::${OIDC_TOKEN}"
          echo "token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      # Authenticate with pull-only scope for scanning -- least privilege
      - name: Authenticate to SpectonCR (pull-only)
        id: spectoncr-auth
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "${{ env.SPECTONCR_AUTH_URL }}/auth/github-actions/token" \
            -H "Content-Type: application/json" \
            -d "{
              \"identity_token\": \"${{ steps.github-oidc.outputs.token }}\",
              \"scope\": {
                \"tenant\": \"${{ env.SPECTONCR_TENANT }}\",
                \"project\": \"${{ env.SPECTONCR_PROJECT }}\",
                \"repository\": \"${{ env.IMAGE_NAME }}\",
                \"actions\": [\"pull\"]
              }
            }")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::SpectonCR auth failed (HTTP ${HTTP_CODE})"
            exit 1
          fi
          ACCESS_TOKEN=$(echo "${BODY}" | jq -r '.token')
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Docker login to SpectonCR
        run: |
          echo "${{ steps.spectoncr-auth.outputs.token }}" | \
            docker login "${{ env.SPECTONCR_REGISTRY }}" \
              --username "github-actions" \
              --password-stdin

      # Run Trivy vulnerability scanner against the pushed image
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.SPECTONCR_REGISTRY }}/${{ env.SPECTONCR_TENANT }}/${{ env.SPECTONCR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          # Fail the pipeline on CRITICAL or HIGH vulnerabilities
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

      # Upload results to GitHub Security tab (requires security-events: write)
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Docker logout (cleanup)
        if: always()
        run: |
          docker logout "${{ env.SPECTONCR_REGISTRY }}" 2>/dev/null || true
          rm -f "${HOME}/.docker/config.json" 2>/dev/null || true

  # ==========================================================================
  # Job: verify
  #
  # Final verification that the image is pullable from SpectonCR.
  # Uses a separate OIDC token exchange with pull-only scope.
  # ==========================================================================
  verify:
    runs-on: ubuntu-latest
    needs: create-manifest
    if: github.event_name == 'push'

    steps:
      - name: Get GitHub OIDC token
        id: github-oidc
        run: |
          OIDC_TOKEN=$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=spectoncr" \
            | jq -r '.value')
          echo "::add-mask::${OIDC_TOKEN}"
          echo "token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate to SpectonCR (pull-only)
        id: spectoncr-auth
        run: |
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST \
            "${{ env.SPECTONCR_AUTH_URL }}/auth/github-actions/token" \
            -H "Content-Type: application/json" \
            -d "{
              \"identity_token\": \"${{ steps.github-oidc.outputs.token }}\",
              \"scope\": {
                \"tenant\": \"${{ env.SPECTONCR_TENANT }}\",
                \"project\": \"${{ env.SPECTONCR_PROJECT }}\",
                \"repository\": \"${{ env.IMAGE_NAME }}\",
                \"actions\": [\"pull\"]
              }
            }")
          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::SpectonCR auth failed"
            exit 1
          fi
          ACCESS_TOKEN=$(echo "${BODY}" | jq -r '.token')
          echo "::add-mask::${ACCESS_TOKEN}"
          echo "token=${ACCESS_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Docker login to SpectonCR
        run: |
          echo "${{ steps.spectoncr-auth.outputs.token }}" | \
            docker login "${{ env.SPECTONCR_REGISTRY }}" \
              --username "github-actions" \
              --password-stdin

      - name: Verify image is pullable
        run: |
          IMAGE="${{ env.SPECTONCR_REGISTRY }}/${{ env.SPECTONCR_TENANT }}/${{ env.SPECTONCR_PROJECT }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "Pulling image: ${IMAGE}"
          docker pull "${IMAGE}"
          echo "Image verified successfully: ${IMAGE}"

          # Print image details
          docker inspect "${IMAGE}" --format '{{.RepoDigests}}'

      - name: Docker logout (cleanup)
        if: always()
        run: |
          docker logout "${{ env.SPECTONCR_REGISTRY }}" 2>/dev/null || true
          rm -f "${HOME}/.docker/config.json" 2>/dev/null || true
