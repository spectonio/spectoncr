---
# NebulaCR Mirror - Native deployment via Ansible
# Installs nebula-registry and nebula-auth as systemd services on a bare-metal server.
#
# Usage:
#   ansible-playbook -i inventory.yml deploy-mirror.yml
#   ansible-playbook -i inventory.yml deploy-mirror.yml -e nebulacr_version=latest
#
# The playbook:
#   1. Downloads the NebulaCR container image from GHCR
#   2. Extracts the binaries (nebula-registry, nebula-auth)
#   3. Generates JWT keys if missing
#   4. Creates systemd services
#   5. Starts and enables both services

- name: Deploy NebulaCR Mirror (native)
  hosts: mirror
  become: true
  vars:
    nebulacr_image: "ghcr.io/bwalia/nebulacr:latest"
    nebulacr_version: "latest"
    nebulacr_user: nebulacr
    nebulacr_group: nebulacr
    registry_port: "{{ nebulacr_registry_port | default('5050') }}"
    auth_port: "{{ nebulacr_auth_port | default('5051') }}"
    metrics_port: "{{ nebulacr_metrics_port | default('9095') }}"
    data_dir: "{{ nebulacr_data_dir | default('/var/lib/nebulacr/data') }}"
    config_dir: "{{ nebulacr_config_dir | default('/etc/nebulacr') }}"
    keys_dir: "{{ nebulacr_keys_dir | default('/etc/nebulacr/keys') }}"
    bin_dir: /usr/local/bin
    primary_registry: "acc-nebulacr.diytaxreturn.co.uk"

    # ── Observability stack (Prometheus + Grafana) ───────────────
    # Toggle the entire observability stack on/off. When true, both
    # services run as docker containers managed by systemd-via-docker
    # (no docker-compose dependency). Default false so existing
    # deployments are no-op upgrades.
    observability_enabled: "{{ nebulacr_observability_enabled | default(false) }}"
    prometheus_image: "prom/prometheus:v2.55.1"
    prometheus_port: "{{ nebulacr_prometheus_port | default('9091') }}"
    prometheus_dir: /var/lib/nebulacr/prometheus
    grafana_image: "grafana/grafana:11.3.1"
    grafana_port: "{{ nebulacr_grafana_port | default('13002') }}"
    grafana_dir: /var/lib/nebulacr/grafana
    grafana_admin_user: "{{ nebulacr_grafana_admin_user | default('admin') }}"
    # Override in inventory or with -e — admin/admin is for demos.
    grafana_admin_password: "{{ nebulacr_grafana_admin_password | default('admin') }}"

  tasks:
    # ── System user ──────────────────────────────────────────
    - name: Create nebulacr system user
      user:
        name: "{{ nebulacr_user }}"
        group: "{{ nebulacr_group }}"
        system: true
        shell: /sbin/nologin
        create_home: false
      register: user_created
      ignore_errors: true

    - name: Create nebulacr group
      group:
        name: "{{ nebulacr_group }}"
        system: true
      when: user_created is failed

    - name: Retry create user after group
      user:
        name: "{{ nebulacr_user }}"
        group: "{{ nebulacr_group }}"
        system: true
        shell: /sbin/nologin
        create_home: false
      when: user_created is failed

    # ── Directories ──────────────────────────────────────────
    - name: Create directories
      file:
        path: "{{ item }}"
        state: directory
        owner: "{{ nebulacr_user }}"
        group: "{{ nebulacr_group }}"
        mode: "0750"
      loop:
        - "{{ data_dir }}"
        - "{{ config_dir }}"
        - "{{ keys_dir }}"

    # ── Extract binaries from Docker image ───────────────────
    - name: Pull NebulaCR image
      command: docker pull {{ nebulacr_image }}
      register: pull_result
      changed_when: "'Downloaded newer image' in pull_result.stdout or 'Pull complete' in pull_result.stdout"

    - name: Create temp container to extract binaries
      command: docker create --name nebulacr-extract {{ nebulacr_image }}
      register: create_result
      changed_when: true

    - name: Extract nebula-registry binary
      command: docker cp nebulacr-extract:/usr/local/bin/nebula-registry {{ bin_dir }}/nebula-registry
      changed_when: true
      notify: restart nebulacr-registry

    - name: Extract nebula-auth binary
      command: docker cp nebulacr-extract:/usr/local/bin/nebula-auth {{ bin_dir }}/nebula-auth
      changed_when: true
      notify: restart nebulacr-auth

    - name: Remove temp container
      command: docker rm nebulacr-extract
      changed_when: true

    - name: Set binary permissions
      file:
        path: "{{ item }}"
        mode: "0755"
        owner: root
        group: root
      loop:
        - "{{ bin_dir }}/nebula-registry"
        - "{{ bin_dir }}/nebula-auth"

    # ── JWT keys ─────────────────────────────────────────────
    - name: Check if JWT keys exist
      stat:
        path: "{{ keys_dir }}/private.pem"
      register: jwt_key

    - name: Generate JWT RSA key pair
      shell: |
        openssl genrsa -out {{ keys_dir }}/private.pem 4096
        openssl rsa -in {{ keys_dir }}/private.pem -pubout -out {{ keys_dir }}/public.pem
        # Create signing/verification aliases
        cp {{ keys_dir }}/private.pem {{ keys_dir }}/signing.pem
        cp {{ keys_dir }}/public.pem {{ keys_dir }}/verification.pem
        chown {{ nebulacr_user }}:{{ nebulacr_group }} {{ keys_dir }}/*.pem
        chmod 640 {{ keys_dir }}/private.pem {{ keys_dir }}/signing.pem
        chmod 644 {{ keys_dir }}/public.pem {{ keys_dir }}/verification.pem
      when: not jwt_key.stat.exists

    # ── Configuration ────────────────────────────────────────
    - name: Write registry config
      copy:
        dest: "{{ config_dir }}/registry.yaml"
        owner: "{{ nebulacr_user }}"
        group: "{{ nebulacr_group }}"
        mode: "0640"
        content: |
          server:
            listen_addr: "0.0.0.0:{{ registry_port }}"
            metrics_addr: "0.0.0.0:{{ metrics_port }}"

          auth:
            service_url: "http://127.0.0.1:{{ auth_port }}"
            jwt:
              access_token_ttl: 3600
              refresh_token_ttl: 86400
              signing_key_path: "{{ keys_dir }}/signing.pem"
              verification_key_path: "{{ keys_dir }}/verification.pem"

          storage:
            backend: "filesystem"
            filesystem:
              root_directory: "{{ data_dir }}"

          pull_through_cache:
            enabled: true
            default_upstream: "docker.io"
            ttl: 86400
            upstreams:
              docker.io:
                url: "https://registry-1.docker.io"
              ghcr.io:
                url: "https://ghcr.io"
              quay.io:
                url: "https://quay.io"
              registry.k8s.io:
                url: "https://registry.k8s.io"
              # Pull-through from primary NebulaCR
              primary:
                url: "https://{{ primary_registry }}"

          rate_limit:
            default_rps: 100
            ip_rps: 50
            pull_rpm: 1000
            push_rpm: 500

          multi_region:
            enabled: true
            local_region: "srv1423968-mirror"
            health_check_interval_secs: 10
            internal_port: 5002
            replication:
              mode: "async"
              max_lag_secs: 60
              batch_size: 50
              sweep_interval_secs: 10
            regions:
              - name: "k3s0-primary"
                endpoint: "https://{{ primary_registry }}"
                internal_endpoint: "http://192.168.1.211:80"
                is_primary: true
                priority: 1
              - name: "srv1423968-mirror"
                endpoint: "https://acc-nebulacr-mirror.diytaxreturn.co.uk"
                internal_endpoint: "http://127.0.0.1:5002"
                is_primary: false
                priority: 2
      notify: restart nebulacr-registry

    - name: Write auth config
      copy:
        dest: "{{ config_dir }}/auth.yaml"
        owner: "{{ nebulacr_user }}"
        group: "{{ nebulacr_group }}"
        mode: "0640"
        content: |
          server:
            auth_listen_addr: "0.0.0.0:{{ auth_port }}"

          auth:
            issuer: "nebulacr"
            audience: "nebulacr-registry"
            signing_algorithm: "RS256"
            signing_key_path: "{{ keys_dir }}/signing.pem"
            verification_key_path: "{{ keys_dir }}/verification.pem"
            token_ttl_seconds: 300
            bootstrap_admin:
              username: "admin"
              password_hash: "8c6976e5b5410415bde908bd4dee15dfb167a9c873fc4bb8a81f6f2ab448a918"

          rate_limit:
            token_issue_rpm: 60
      notify: restart nebulacr-auth

    # ── Systemd services ─────────────────────────────────────
    - name: Install nebula-registry systemd service
      copy:
        dest: /etc/systemd/system/nebulacr-registry.service
        mode: "0644"
        content: |
          [Unit]
          Description=NebulaCR OCI Registry
          Documentation=https://github.com/bwalia/nebulacr
          After=network-online.target nebulacr-auth.service
          Wants=network-online.target
          Requires=nebulacr-auth.service

          [Service]
          Type=simple
          User={{ nebulacr_user }}
          Group={{ nebulacr_group }}
          ExecStart={{ bin_dir }}/nebula-registry --config={{ config_dir }}/registry.yaml
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65536

          Environment=RUST_LOG=info
          Environment=NEBULACR_AUTH_SERVICE=nebulacr-registry
          Environment=NEBULACR_AUTH_SERVICE_URL=http://127.0.0.1:{{ auth_port }}

          [Install]
          WantedBy=multi-user.target
      notify: restart nebulacr-registry

    - name: Install nebula-auth systemd service
      copy:
        dest: /etc/systemd/system/nebulacr-auth.service
        mode: "0644"
        content: |
          [Unit]
          Description=NebulaCR Auth Service
          Documentation=https://github.com/bwalia/nebulacr
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          User={{ nebulacr_user }}
          Group={{ nebulacr_group }}
          ExecStart={{ bin_dir }}/nebula-auth --config={{ config_dir }}/auth.yaml
          Restart=on-failure
          RestartSec=5
          LimitNOFILE=65536

          Environment=RUST_LOG=info

          [Install]
          WantedBy=multi-user.target
      notify: restart nebulacr-auth

    - name: Reload systemd
      systemd:
        daemon_reload: true

    - name: Enable and start services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: true
      loop:
        - nebulacr-auth
        - nebulacr-registry

    # ── Health check ─────────────────────────────────────────
    - name: Wait for registry to be ready
      uri:
        url: "http://127.0.0.1:{{ registry_port }}/health"
        return_content: true
      register: health
      retries: 10
      delay: 3
      until: health.status == 200

    - name: Display health status
      debug:
        msg: "NebulaCR Mirror is healthy on port {{ registry_port }}: {{ health.json }}"

    # ── Observability: Prometheus + Grafana ───────────────────────
    # Runs both as docker containers reusing the host's docker daemon
    # (already present from the binary-extract step). Each ships its
    # config from a host directory we own, so dashboards survive
    # `docker rm` and `docker pull` re-rolls.
    - name: Observability — directories
      when: observability_enabled | bool
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop:
        - "{{ prometheus_dir }}"
        - "{{ prometheus_dir }}/rules"
        - "{{ grafana_dir }}"
        - "{{ grafana_dir }}/provisioning/datasources"
        - "{{ grafana_dir }}/provisioning/dashboards"
        - "{{ grafana_dir }}/dashboards"

    - name: Observability — write prometheus.yml
      when: observability_enabled | bool
      copy:
        dest: "{{ prometheus_dir }}/prometheus.yml"
        owner: root
        group: root
        mode: "0644"
        # The mirror's nebulacr binaries listen on the host network
        # at registry_port + auth_port, both of which serve /metrics.
        # Prometheus uses host.docker.internal — the docker bridge
        # gateway hostname — to reach them without a custom network.
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s
            external_labels:
              cluster: nebulacr-mirror
              host: {{ ansible_hostname }}

          scrape_configs:
            - job_name: nebulacr-registry
              metrics_path: /metrics
              static_configs:
                - targets:
                    - host.docker.internal:{{ registry_port }}
                  labels:
                    service: nebulacr-registry
            - job_name: nebulacr-auth
              metrics_path: /metrics
              static_configs:
                - targets:
                    - host.docker.internal:{{ auth_port }}
                  labels:
                    service: nebulacr-auth
            - job_name: prometheus
              static_configs:
                - targets:
                    - localhost:9090
      notify: restart prometheus

    - name: Observability — Grafana datasource (Prometheus)
      when: observability_enabled | bool
      copy:
        dest: "{{ grafana_dir }}/provisioning/datasources/prometheus.yml"
        owner: root
        group: root
        mode: "0644"
        content: |
          apiVersion: 1
          datasources:
            - name: Prometheus
              uid: prometheus
              type: prometheus
              access: proxy
              url: http://nebulacr-prometheus:9090
              isDefault: true
              editable: false
              jsonData:
                timeInterval: 15s
                httpMethod: POST
      notify: restart grafana

    - name: Observability — Grafana dashboard provider
      when: observability_enabled | bool
      copy:
        dest: "{{ grafana_dir }}/provisioning/dashboards/nebulacr.yml"
        owner: root
        group: root
        mode: "0644"
        content: |
          apiVersion: 1
          providers:
            - name: NebulaCR
              orgId: 1
              folder: NebulaCR
              type: file
              disableDeletion: false
              allowUiUpdates: true
              updateIntervalSeconds: 30
              options:
                path: /var/lib/grafana/dashboards
      notify: restart grafana

    # Pull each NebulaCR dashboard JSON from the source repo on the
    # control node and ship to the mirror. The same files the Helm
    # chart ConfigMaps emit, kept in deploy/observability for the
    # docker-compose stack.
    - name: Observability — copy dashboard JSONs
      when: observability_enabled | bool
      copy:
        src: "{{ item }}"
        dest: "{{ grafana_dir }}/dashboards/{{ item | basename }}"
        owner: root
        group: root
        mode: "0644"
      with_fileglob:
        - "{{ playbook_dir }}/../observability/grafana/dashboards/*.json"
      notify: restart grafana

    - name: Observability — Prometheus container
      when: observability_enabled | bool
      docker_container:
        name: nebulacr-prometheus
        image: "{{ prometheus_image }}"
        restart_policy: unless-stopped
        published_ports:
          - "{{ prometheus_port }}:9090"
        volumes:
          - "{{ prometheus_dir }}/prometheus.yml:/etc/prometheus/prometheus.yml:ro"
          - "{{ prometheus_dir }}/rules:/etc/prometheus/rules:ro"
          - "nebulacr-prometheus-data:/prometheus"
        command:
          - --config.file=/etc/prometheus/prometheus.yml
          - --storage.tsdb.path=/prometheus
          - --storage.tsdb.retention.time=15d
          - --web.enable-lifecycle
        # host.docker.internal must resolve so prometheus can scrape
        # the host-network nebulacr binaries.
        etc_hosts:
          host.docker.internal: host-gateway

    - name: Observability — Grafana container
      when: observability_enabled | bool
      docker_container:
        name: nebulacr-grafana
        image: "{{ grafana_image }}"
        restart_policy: unless-stopped
        published_ports:
          - "{{ grafana_port }}:3000"
        env:
          GF_SECURITY_ADMIN_USER: "{{ grafana_admin_user }}"
          GF_SECURITY_ADMIN_PASSWORD: "{{ grafana_admin_password }}"
          GF_USERS_ALLOW_SIGN_UP: "false"
          GF_AUTH_ANONYMOUS_ENABLED: "false"
        volumes:
          - "{{ grafana_dir }}/provisioning:/etc/grafana/provisioning:ro"
          - "{{ grafana_dir }}/dashboards:/var/lib/grafana/dashboards:ro"
          - "nebulacr-grafana-data:/var/lib/grafana"
        # Connect both containers to the same docker bridge so
        # Grafana can resolve `nebulacr-prometheus` by name.
        networks:
          - name: nebulacr-obs

    - name: Observability — wait for Grafana
      when: observability_enabled | bool
      uri:
        url: "http://127.0.0.1:{{ grafana_port }}/api/health"
        return_content: true
      register: grafana_health
      retries: 12
      delay: 5
      until: grafana_health.status == 200

    - name: Observability — show URLs
      when: observability_enabled | bool
      debug:
        msg: |
          Observability stack live on {{ ansible_hostname }}:
            Grafana    → http://{{ ansible_default_ipv4.address }}:{{ grafana_port }}/  ({{ grafana_admin_user }}/{{ grafana_admin_password }})
            Prometheus → http://{{ ansible_default_ipv4.address }}:{{ prometheus_port }}/

  handlers:
    - name: restart nebulacr-auth
      systemd:
        name: nebulacr-auth
        state: restarted

    - name: restart nebulacr-registry
      systemd:
        name: nebulacr-registry
        state: restarted

    - name: restart prometheus
      docker_container:
        name: nebulacr-prometheus
        state: started
        restart: true
      when: observability_enabled | bool

    - name: restart grafana
      docker_container:
        name: nebulacr-grafana
        state: started
        restart: true
      when: observability_enabled | bool
