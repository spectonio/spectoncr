{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nebulacr.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.auth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nebulacr.auth.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow from the ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - port: {{ .Values.auth.port }}
          protocol: TCP
    # Allow from registry pods (internal token validation)
    - from:
        - podSelector:
            matchLabels:
              {{- include "nebulacr.registry.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ .Values.auth.port }}
          protocol: TCP
    # Allow metrics scraping from monitoring namespace.
    # /metrics is served on the HTTP port (5001) by nebula-auth too;
    # see the registry netpol comment below for context.
    {{- if .Values.networkPolicy.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - port: {{ .Values.auth.port }}
          protocol: TCP
        - port: {{ .Values.auth.metricsPort }}
          protocol: TCP
    {{- end }}
    # Allow from additional namespaces (e.g. CI runners)
    {{- range .Values.networkPolicy.extraAllowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - port: {{ $.Values.auth.port }}
          protocol: TCP
    {{- end }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nebulacr.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.registry.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nebulacr.registry.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow from the ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.ingressNamespace }}
      ports:
        - port: {{ .Values.registry.port }}
          protocol: TCP
    # Allow metrics scraping from monitoring namespace.
    # `/metrics` is on the HTTP port (5000), not the dedicated
    # metricsPort which the binary doesn't bind. We open both so
    # operators using a future split-port build don't have to flip
    # this back.
    {{- if .Values.networkPolicy.monitoringNamespace }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.monitoringNamespace }}
      ports:
        - port: {{ .Values.registry.port }}
          protocol: TCP
        - port: {{ .Values.registry.metricsPort }}
          protocol: TCP
    {{- end }}
    # Allow from additional namespaces (e.g. CI runners)
    {{- range .Values.networkPolicy.extraAllowedNamespaces }}
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
      ports:
        - port: {{ $.Values.registry.port }}
          protocol: TCP
    {{- end }}
    {{- if $.Values.multiRegion.enabled }}
    # Allow internal replication traffic between registry peers
    - from:
        - podSelector:
            matchLabels:
              {{- include "nebulacr.registry.selectorLabels" . | nindent 14 }}
      ports:
        - port: {{ $.Values.multiRegion.internalPort }}
          protocol: TCP
    # Allow replication from any source (cross-cluster mirrors)
    - ports:
        - port: {{ $.Values.multiRegion.internalPort }}
          protocol: TCP
    {{- end }}
{{- if .Values.postgres.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nebulacr.postgres.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.postgres.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nebulacr.postgres.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Only the registry pod (scanner runs in-process there) needs Postgres.
    - from:
        - podSelector:
            matchLabels:
              {{- include "nebulacr.registry.selectorLabels" . | nindent 14 }}
      ports:
        - port: 5432
          protocol: TCP
    {{- if .Values.grafana.enabled }}
    # In-chart Grafana also reads Postgres for the enterprise
    # dashboards (storage / cost / CVE panels). Limited to the
    # subchart's own pod label.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: grafana
              app.kubernetes.io/instance: {{ .Release.Name }}
      ports:
        - port: 5432
          protocol: TCP
    {{- end }}
{{- end }}
{{- if .Values.redis.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "nebulacr.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.redis.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "nebulacr.redis.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "nebulacr.registry.selectorLabels" . | nindent 14 }}
      ports:
        - port: 6379
          protocol: TCP
{{- end }}
{{- end }}
