apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nebulacr.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.registry.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.registry.enabled }}
  replicas: {{ .Values.registry.replicas }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "nebulacr.registry.selectorLabels" . | nindent 6 }}
  {{- if and (eq .Values.storage.backend "filesystem") .Values.storage.filesystem.persistence.enabled }}
  strategy:
    type: Recreate
  {{- else }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.registry.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "nebulacr.registry.selectorLabels" . | nindent 8 }}
        {{- with .Values.registry.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "nebulacr.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.registry.securityContext | nindent 8 }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    {{- include "nebulacr.registry.selectorLabels" . | nindent 20 }}
                topologyKey: kubernetes.io/hostname
        {{- with .Values.registry.affinity }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.registry.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.registry.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.scanner.enabled .Values.postgres.enabled }}
      initContainers:
        # Scanner init tries to open a pool against postgres at registry
        # start; if postgres isn't ready yet, scanner falls back to
        # "continuing without it" and never picks up scan jobs. Block the
        # registry until postgres accepts connections.
        - name: wait-for-postgres
          image: {{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}
          command:
            - sh
            - -c
            - |
              until pg_isready -h {{ include "nebulacr.postgres.fullname" . }} \
                                -p 5432 \
                                -U {{ .Values.postgres.username | default "nebulacr" | quote }}; do
                echo "waiting for postgres..."
                sleep 2
              done
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      {{- end }}
      containers:
        - name: registry
          image: {{ include "nebulacr.registry.image" . }}
          imagePullPolicy: {{ .Values.registry.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.registry.containerSecurityContext | nindent 12 }}
          args:
            - nebula-registry
            - serve
            - --config=/etc/nebulacr/config/registry.yaml
          ports:
            - name: http
              containerPort: {{ .Values.registry.port }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.registry.metricsPort }}
              protocol: TCP
          env:
            - name: NEBULACR_LOG_LEVEL
              value: {{ .Values.observability.logLevel | quote }}
            - name: NEBULACR_AUTH_REALM
              value: "/auth/token"
            {{- if .Values.ingress.host }}
            - name: NEBULACR_EXTERNAL_URL
              value: "https://{{ .Values.ingress.host }}"
            {{- end }}
            {{- if and .Values.oidc.enabled .Values.oidc.clientSecret }}
            - name: NEBULACR_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.fullname" . }}-oidc
                  key: client-secret
            {{- end }}
            {{- if and (eq .Values.storage.backend "s3") (or .Values.storage.s3.existingSecret .Values.storage.s3.accessKey) }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.s3.secretName" . }}
                  key: {{ .Values.storage.s3.accessKeyField }}
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.s3.secretName" . }}
                  key: {{ .Values.storage.s3.secretKeyField }}
            {{- end }}
            {{- if and (eq .Values.storage.backend "azure") (or .Values.storage.azure.existingSecret .Values.storage.azure.accountKey) }}
            - name: AZURE_STORAGE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.azure.secretName" . }}
                  key: {{ .Values.storage.azure.accountKeyField }}
            {{- end }}
            {{- if .Values.pullThroughCache.enabled }}
            {{- range $name, $upstream := .Values.pullThroughCache.upstreams }}
            {{- if or $upstream.existingSecret $upstream.username }}
            {{- $envPrefix := $name | upper | replace "." "_" | replace "-" "_" }}
            {{- $secretName := include "nebulacr.upstream.secretName" (list (include "nebulacr.fullname" $) $name $upstream) }}
            - name: {{ $envPrefix }}_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default "username" $upstream.usernameField }}
            - name: {{ $envPrefix }}_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ default "password" $upstream.passwordField }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.observability.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.observability.otlpEndpoint | quote }}
            {{- end }}
            {{- if .Values.scanner.enabled }}
            # ── Scanner ────────────────────────────────────────────────
            # When scanner.worker.enabled=false (default), workers run
            # in-process here. When true, this pod switches to
            # enqueue-only mode and a separate nebula-scanner Deployment
            # dequeues from the `scan_jobs` Postgres table.
            - name: NEBULACR_SCANNER__ENABLED
              value: "true"
            {{- if .Values.scanner.worker.enabled }}
            - name: NEBULACR_SCANNER__QUEUE_BACKEND
              value: "postgres"
            - name: NEBULACR_SCANNER__ENQUEUE_ONLY
              value: "true"
            {{- end }}
            - name: NEBULACR_POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "nebulacr.postgres.secretName" . }}
                  key: password
            - name: NEBULACR_SCANNER__POSTGRES_URL
              value: {{ include "nebulacr.scanner.postgresUrl" . | quote }}
            - name: NEBULACR_SCANNER__REDIS_URL
              value: {{ include "nebulacr.scanner.redisUrl" . | quote }}
            - name: NEBULACR_SCANNER__VULNDB
              value: {{ .Values.scanner.vulndb | default "osv" | quote }}
            - name: NEBULACR_SCANNER__WORKERS
              value: {{ .Values.scanner.workers | default 2 | quote }}
            - name: NEBULACR_SCANNER__INGEST_ENABLED
              value: {{ .Values.scanner.ingest.enabled | default false | quote }}
            {{- if .Values.scanner.ingest.intervalSecs }}
            - name: NEBULACR_SCANNER__INGEST_INTERVAL_SECS
              value: {{ .Values.scanner.ingest.intervalSecs | quote }}
            {{- end }}
            {{- if .Values.scanner.ingest.nvdEnabled }}
            - name: NEBULACR_SCANNER__NVD_ENABLED
              value: "true"
            {{- if .Values.scanner.ingest.nvdApiKeySecret }}
            - name: NEBULACR_SCANNER__NVD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.scanner.ingest.nvdApiKeySecret.name }}
                  key: {{ .Values.scanner.ingest.nvdApiKeySecret.key | default "api-key" }}
            {{- end }}
            {{- end }}
            {{- if .Values.scanner.ingest.ghsaEnabled }}
            - name: NEBULACR_SCANNER__GHSA_ENABLED
              value: "true"
            {{- if .Values.scanner.ingest.ghsaTokenSecret }}
            - name: NEBULACR_SCANNER__GHSA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.scanner.ingest.ghsaTokenSecret.name }}
                  key: {{ .Values.scanner.ingest.ghsaTokenSecret.key | default "token" }}
            {{- end }}
            {{- end }}
            - name: NEBULACR_SCANNER__AI_ENABLED
              value: {{ .Values.scanner.ai.enabled | default false | quote }}
            {{- if .Values.scanner.ai.enabled }}
            - name: NEBULACR_SCANNER__AI_ENDPOINT
              value: {{ .Values.scanner.ai.endpoint | quote }}
            {{- if .Values.scanner.ai.model }}
            - name: NEBULACR_SCANNER__AI_MODEL
              value: {{ .Values.scanner.ai.model | quote }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.usage.enabled }}
            - name: NEBULACR_USAGE__ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.lazy.enabled }}
            - name: NEBULACR_LAZY__ENABLED
              value: "true"
            - name: NEBULACR_LAZY__FORMAT
              value: {{ .Values.lazy.format | quote }}
            {{- end }}
            {{- if .Values.ttl.reaper.enabled }}
            - name: NEBULACR_TTL__REAPER_ENABLED
              value: "true"
            - name: NEBULACR_TTL__REAPER_BATCH
              value: {{ .Values.ttl.reaper.batch | quote }}
            - name: NEBULACR_TTL__REAPER_IDLE_SLEEP_SECS
              value: {{ .Values.ttl.reaper.idleSleepSecs | quote }}
            {{- end }}
            {{- if .Values.gc.online.enabled }}
            - name: NEBULACR_GC__ONLINE
              value: "true"
            {{- if .Values.gc.online.postgresUrl }}
            - name: NEBULACR_GC__POSTGRES_URL
              value: {{ .Values.gc.online.postgresUrl | quote }}
            {{- end }}
            - name: NEBULACR_GC__REAPER_ENABLED
              value: {{ .Values.gc.online.reaper.enabled | quote }}
            - name: NEBULACR_GC__REAPER_GRACE_SECS
              value: {{ .Values.gc.online.reaper.graceSecs | quote }}
            - name: NEBULACR_GC__REAPER_BATCH
              value: {{ .Values.gc.online.reaper.batch | quote }}
            - name: NEBULACR_GC__REAPER_IDLE_SLEEP_SECS
              value: {{ .Values.gc.online.reaper.idleSleepSecs | quote }}
            - name: NEBULACR_GC__REAPER_QPS
              value: {{ .Values.gc.online.reaper.qps | quote }}
            {{- end }}
            {{- with .Values.registry.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml .Values.registry.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/nebulacr/config
              readOnly: true
            - name: signing-keys
              mountPath: /etc/nebulacr/keys
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- if eq .Values.storage.backend "filesystem" }}
            - name: data
              mountPath: {{ .Values.storage.filesystem.rootDirectory }}
            {{- end }}
            {{- if eq .Values.storage.backend "gcs" }}
            - name: gcs-keyfile
              mountPath: /etc/nebulacr/gcs
              readOnly: true
            {{- end }}
            {{- with .Values.registry.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "nebulacr.configMapName" . }}
        - name: signing-keys
          secret:
            secretName: {{ include "nebulacr.jwt.secretName" . }}
            defaultMode: 0440
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
        {{- if eq .Values.storage.backend "filesystem" }}
        - name: data
          {{- if .Values.storage.filesystem.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "nebulacr.fullname" .)) .Values.storage.filesystem.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- if eq .Values.storage.backend "gcs" }}
        - name: gcs-keyfile
          secret:
            secretName: {{ include "nebulacr.gcs.secretName" . }}
            defaultMode: 0440
        {{- end }}
        {{- with .Values.registry.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
---
{{- if and (eq .Values.storage.backend "filesystem") .Values.storage.filesystem.persistence.enabled (not .Values.storage.filesystem.persistence.existingClaim) }}
{{- /*
A PVC's `.spec` is immutable once bound. If we render the chart
without `.spec.volumeName` but the live PVC has one, helm v3 SSA
diff says "set volumeName to empty" and the API rejects with
"spec: Forbidden". To stay compatible with bound PVCs from
previous releases, look up the live object and re-emit its
volumeName so the rendered spec matches reality.
See deploy run 25965869599.
*/ -}}
{{- $existingPvc := lookup "v1" "PersistentVolumeClaim" .Release.Namespace (printf "%s-data" (include "nebulacr.fullname" .)) -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nebulacr.fullname" . }}-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "nebulacr.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - {{ .Values.storage.filesystem.persistence.accessMode }}
  {{- if .Values.storage.filesystem.persistence.storageClass }}
  storageClassName: {{ .Values.storage.filesystem.persistence.storageClass | quote }}
  {{- end }}
  {{- if and $existingPvc $existingPvc.spec.volumeName }}
  volumeName: {{ $existingPvc.spec.volumeName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.filesystem.persistence.size }}
{{- end }}
