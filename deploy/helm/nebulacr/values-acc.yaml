auth:
  image:
    tag: "latest"
  replicas: 2
  resources:
    limits:
      cpu: "1"
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
autoscaling:
  auth:
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
      scaleUp:
        stabilizationWindowSeconds: 60
    enabled: false
    maxReplicas: 8
    minReplicas: 2
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  registry:
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
      scaleUp:
        stabilizationWindowSeconds: 30
    enabled: false
    maxReplicas: 15
    minReplicas: 3
    targetCPUUtilizationPercentage: 65
    targetMemoryUtilizationPercentage: 75
ingress:
  annotations:
    cert-manager.io/cluster-issuer: main-issuer
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
  authPath: /auth
  className: wslproxy
  enabled: true
  host: acc-nebulacr.diytaxreturn.co.uk
  registryPath: /v2
  tls:
    enabled: true
    secretName: nebulacr-tls
  security:
    exposeAllAuthPaths: false
    exposeGitHubActions: false
  dashboard:
    enabled: true
jwt:
  existingSecret: nebulacr-jwt-keys
networkPolicy:
  enabled: true
  ingressNamespace: wslproxy-system
  monitoringNamespace: monitoring
  extraAllowedNamespaces:
    - github-runners
    - acc
observability:
  logFormat: json
  logLevel: info
podDisruptionBudget:
  auth:
    enabled: true
    minAvailable: 1
  registry:
    enabled: true
    minAvailable: 1
rateLimiting:
  burst: 500
  enabled: true
  pullRatePerTenant: 2000
  pushRatePerTenant: 1000
  requestsPerSecond: 200
registry:
  image:
    tag: "latest"
  replicas: 1
  nodeSelector:
    kubernetes.io/hostname: debian001
  resources:
    limits:
      cpu: "2"
      memory: 8Gi
    requests:
      cpu: 500m
      memory: 2Gi
serviceAccount:
  create: true
  name: nebulacr
multiRegion:
  enabled: true
  localRegion: "k3s0-primary"
  healthCheckIntervalSecs: 10
  internalPort: 5002
  replication:
    mode: "async"
    maxLagSecs: 60
    batchSize: 50
    sweepIntervalSecs: 10
  regions:
    - name: "k3s0-primary"
      endpoint: "https://acc-nebulacr.diytaxreturn.co.uk"
      internalEndpoint: "http://nebulacr-registry.acc.svc.cluster.local:5002"
      isPrimary: true
      priority: 1
    - name: "srv1423968-mirror"
      endpoint: "https://acc-nebulacr-mirror.diytaxreturn.co.uk"
      internalEndpoint: "https://acc-nebulacr-mirror.diytaxreturn.co.uk"
      isPrimary: false
      priority: 2
scanner:
  enabled: true
  vulndb: osv
  workers: 2
  ingest:
    enabled: false
  ai:
    enabled: true
    endpoint: "https://ollama.workstation.co.uk/"
    model: "qwen2.5-coder:7b"
postgres:
  enabled: true
  persistence:
    size: 50Gi
    storageClass: local-path
  nodeSelector:
    kubernetes.io/hostname: debian001
redis:
  enabled: true
storage:
  backend: filesystem
  filesystem:
    persistence:
      accessMode: ReadWriteOnce
      enabled: true
      size: 500Gi
      storageClass: local-path

# Render the nebulacr dashboard ConfigMaps (overview + detail) with
# the discovery label the in-chart Grafana sidecar watches for.
nebulacrDashboards:
  enabled: true

# In-chart Grafana — published at acc-nebulacr-grafana.diytaxreturn.co.uk
# with the same TLS/class as the registry ingress.
grafana:
  enabled: true

  ## Inject the in-cluster postgres password into the grafana
  ## container's env so the postgres datasource Secret rendered by
  ## templates/grafana-datasources.yaml resolves
  ## ${POSTGRES_DS_PASSWORD} at runtime.
  envValueFrom:
    POSTGRES_DS_PASSWORD:
      secretKeyRef:
        name: nebulacr-postgres
        key: password

  persistence:
    enabled: true
    size: 5Gi
    storageClassName: local-path

  service:
    type: ClusterIP
    port: 80

  ingress:
    enabled: true
    ingressClassName: wslproxy
    annotations:
      cert-manager.io/cluster-issuer: main-issuer
    hosts:
      - acc-nebulacr-grafana.diytaxreturn.co.uk
    tls:
      - secretName: nebulacr-grafana-tls
        hosts:
          - acc-nebulacr-grafana.diytaxreturn.co.uk

# Default URLs for the parent-chart-rendered datasources. Prometheus
# url defaults to the kube-prometheus-stack server in the monitoring
# namespace; postgres defaults work because postgres.enabled=true.
nebulacrGrafanaDatasources:
  enabled: true
  prometheus:
    url: http://kube-prometheus-stack-prometheus.monitoring.svc:9090
    rootDirectory: /var/lib/nebulacr/data
