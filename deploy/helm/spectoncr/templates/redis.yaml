{{- /*
In-chart Redis singleton for the scanner's ephemeral result cache (1h TTL
per digest). Ephemeral by design — losing the cache is not a data-loss
event, just forces a re-scan on the next poll, so no PVC.
*/ -}}
{{- if .Values.redis.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spectoncr.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spectoncr.redis.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    {{- include "spectoncr.redis.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spectoncr.redis.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spectoncr.redis.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "spectoncr.redis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spectoncr.redis.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.redis.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: redis
          image: {{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}
          imagePullPolicy: {{ .Values.redis.image.pullPolicy | default "IfNotPresent" }}
          args:
            - redis-server
            - --save
            - ""
            - --appendonly
            - "no"
            - --maxmemory
            - {{ .Values.redis.maxmemory | default "512mb" | quote }}
            - --maxmemory-policy
            - {{ .Values.redis.maxmemoryPolicy | default "allkeys-lru" | quote }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
{{- end }}
