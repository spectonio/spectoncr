{{- if .Values.autoscaling.registry.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "spectoncr.fullname" . }}-registry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spectoncr.registry.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "spectoncr.fullname" . }}-registry
  minReplicas: {{ .Values.autoscaling.registry.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.registry.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.registry.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.registry.targetMemoryUtilizationPercentage }}
  {{- with .Values.autoscaling.registry.behavior }}
  behavior:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
