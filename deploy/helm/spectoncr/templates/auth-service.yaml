apiVersion: v1
kind: Service
metadata:
  name: {{ include "spectoncr.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spectoncr.auth.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.auth.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "spectoncr.auth.selectorLabels" . | nindent 4 }}
