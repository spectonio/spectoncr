apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tokenpolicies.spectoncr.io
  labels:
    {{- include "spectoncr.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: spectoncr.io
  names:
    kind: TokenPolicy
    listKind: TokenPolicyList
    plural: tokenpolicies
    singular: tokenpolicy
    shortNames:
      - tp
    categories:
      - spectoncr
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Tenant
          type: string
          jsonPath: .spec.tenantRef
        - name: Max Lifetime
          type: string
          jsonPath: .spec.maxTokenLifetime
        - name: Rotation
          type: boolean
          jsonPath: .spec.rotation.enabled
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: TokenPolicy governs token issuance, lifetime, and rotation rules for a tenant.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: TokenPolicySpec defines the desired token policy configuration.
              required:
                - tenantRef
              properties:
                tenantRef:
                  type: string
                  description: Reference to the Tenant this policy applies to.
                  minLength: 1
                description:
                  type: string
                  description: Human-readable description of this token policy.
                  maxLength: 1024
                maxTokenLifetime:
                  type: string
                  description: Maximum lifetime for access tokens (e.g., 1h, 24h, 7d).
                  pattern: '^[0-9]+(s|m|h|d)$'
                  default: "1h"
                maxRefreshTokenLifetime:
                  type: string
                  description: Maximum lifetime for refresh tokens (e.g., 24h, 30d).
                  pattern: '^[0-9]+(s|m|h|d)$'
                  default: "24h"
                allowedScopes:
                  type: array
                  description: Scopes that tokens issued under this policy may include.
                  items:
                    type: string
                    enum:
                      - "registry:pull"
                      - "registry:push"
                      - "registry:delete"
                      - "registry:admin"
                      - "repository:*"
                      - "repository:pull"
                      - "repository:push"
                maxConcurrentSessions:
                  type: integer
                  format: int32
                  description: Maximum concurrent active sessions per user. 0 means unlimited.
                  minimum: 0
                  default: 0
                rotation:
                  type: object
                  description: Token rotation configuration.
                  properties:
                    enabled:
                      type: boolean
                      description: Whether token rotation is enforced.
                      default: false
                    rotationInterval:
                      type: string
                      description: How often tokens must be rotated (e.g., 12h, 7d).
                      pattern: '^[0-9]+(s|m|h|d)$'
                    gracePeriod:
                      type: string
                      description: Grace period after rotation interval before old token is revoked.
                      pattern: '^[0-9]+(s|m|h|d)$'
                      default: "5m"
                revocation:
                  type: object
                  description: Token revocation settings.
                  properties:
                    revokeOnPasswordChange:
                      type: boolean
                      description: Revoke all tokens when user changes password.
                      default: true
                    revokeOnSuspension:
                      type: boolean
                      description: Revoke all tokens when tenant is suspended.
                      default: true
                    revokeOnPolicyChange:
                      type: boolean
                      description: Revoke affected tokens when policy changes.
                      default: false
                ipRestrictions:
                  type: object
                  description: IP-based restrictions for token usage.
                  properties:
                    bindToIp:
                      type: boolean
                      description: Bind tokens to the IP they were issued from.
                      default: false
                    allowedCidrs:
                      type: array
                      description: CIDR ranges from which tokens may be used. Empty means all.
                      items:
                        type: string
                        pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$|^([0-9a-fA-F:]+)/[0-9]{1,3}$'
                robotAccounts:
                  type: object
                  description: Configuration for robot/service account tokens.
                  properties:
                    enabled:
                      type: boolean
                      description: Whether robot accounts are allowed.
                      default: true
                    maxPerProject:
                      type: integer
                      format: int32
                      description: Maximum robot accounts per project. 0 means unlimited.
                      minimum: 0
                      default: 10
                    maxTokenLifetime:
                      type: string
                      description: Maximum lifetime for robot account tokens.
                      pattern: '^[0-9]+(s|m|h|d)$'
                      default: "365d"
            status:
              type: object
              description: TokenPolicyStatus defines the observed state.
              properties:
                activeTokenCount:
                  type: integer
                  format: int64
                  description: Number of currently active tokens governed by this policy.
                lastRotationTime:
                  type: string
                  format: date-time
                  description: When the last token rotation occurred.
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                observedGeneration:
                  type: integer
                  format: int64
