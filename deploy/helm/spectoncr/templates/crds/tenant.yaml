apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: tenants.spectoncr.io
  labels:
    {{- include "spectoncr.labels" . | nindent 4 }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.14.0
spec:
  group: spectoncr.io
  names:
    kind: Tenant
    listKind: TenantList
    plural: tenants
    singular: tenant
    shortNames:
      - tn
    categories:
      - spectoncr
  scope: Cluster
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Display Name
          type: string
          jsonPath: .spec.displayName
        - name: Status
          type: string
          jsonPath: .status.phase
        - name: Storage Quota
          type: string
          jsonPath: .spec.quotas.storageBytes
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: Tenant represents an isolated organizational unit in SpectonCR.
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              description: TenantSpec defines the desired state of a Tenant.
              required:
                - displayName
                - adminEmail
              properties:
                displayName:
                  type: string
                  description: Human-readable name of the tenant.
                  minLength: 1
                  maxLength: 256
                adminEmail:
                  type: string
                  description: Primary administrator email address.
                  format: email
                  minLength: 1
                oidcSubject:
                  type: string
                  description: OIDC subject identifier that maps to this tenant.
                enabled:
                  type: boolean
                  description: Whether the tenant is active. Defaults to true.
                  default: true
                quotas:
                  type: object
                  description: Resource quotas for this tenant.
                  properties:
                    storageBytes:
                      type: integer
                      format: int64
                      description: Maximum storage in bytes. 0 means unlimited.
                      minimum: 0
                    maxRepositories:
                      type: integer
                      format: int32
                      description: Maximum number of repositories. 0 means unlimited.
                      minimum: 0
                    maxTagsPerRepository:
                      type: integer
                      format: int32
                      description: Maximum tags per repository. 0 means unlimited.
                      minimum: 0
                    pullRateLimit:
                      type: integer
                      format: int32
                      description: Maximum pulls per minute. 0 means unlimited.
                      minimum: 0
                    pushRateLimit:
                      type: integer
                      format: int32
                      description: Maximum pushes per minute. 0 means unlimited.
                      minimum: 0
                storageBackendOverride:
                  type: string
                  description: Override the global storage backend for this tenant.
                  enum:
                    - filesystem
                    - s3
                    - gcs
                    - azure
                allowedIpCidrs:
                  type: array
                  description: CIDR ranges allowed to access this tenant. Empty means all.
                  items:
                    type: string
                    pattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}/[0-9]{1,2}$|^([0-9a-fA-F:]+)/[0-9]{1,3}$'
                labels:
                  type: object
                  description: Arbitrary key-value labels for tenant metadata.
                  additionalProperties:
                    type: string
            status:
              type: object
              description: TenantStatus defines the observed state of a Tenant.
              properties:
                phase:
                  type: string
                  description: Current phase of the tenant.
                  enum:
                    - Pending
                    - Active
                    - Suspended
                    - Deleting
                repositoryCount:
                  type: integer
                  format: int32
                  description: Current number of repositories.
                storageUsedBytes:
                  type: integer
                  format: int64
                  description: Current storage usage in bytes.
                conditions:
                  type: array
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - Unknown
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
                lastReconcileTime:
                  type: string
                  format: date-time
                  description: Timestamp of the last successful reconciliation.
                observedGeneration:
                  type: integer
                  format: int64
