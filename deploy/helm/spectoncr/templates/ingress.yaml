{{- if .Values.ingress.enabled }}
{{- /*
  Ingress for SpectonCR.

  Secure mode (default): Only /v2 (registry) and /auth/token (Docker auth)
  are exposed publicly. /auth/audit, /auth/introspect, /health, and /metrics
  remain cluster-internal. The /auth/.well-known/jwks.json endpoint is available
  internally for token verification by peer services.

  Legacy mode (exposeAllAuthPaths: true): Entire /auth prefix is exposed.
  NOT recommended for production.
*/}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "spectoncr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "spectoncr.labels" . | nindent 4 }}
  annotations:
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      {{- if .Values.ingress.tls.secretName }}
      secretName: {{ .Values.ingress.tls.secretName }}
      {{- end }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.registryPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "spectoncr.fullname" . }}-registry
                port:
                  name: http
          {{- if .Values.ingress.security.exposeAllAuthPaths }}
          - path: {{ .Values.ingress.authPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "spectoncr.fullname" . }}-auth
                port:
                  name: http
          {{- else }}
          - path: /auth/token
            pathType: Prefix
            backend:
              service:
                name: {{ include "spectoncr.fullname" . }}-auth
                port:
                  name: http
          {{- if .Values.ingress.security.exposeGitHubActions }}
          - path: /auth/github-actions
            pathType: Prefix
            backend:
              service:
                name: {{ include "spectoncr.fullname" . }}-auth
                port:
                  name: http
          {{- end }}
          {{- end }}
          {{- if .Values.multiRegion.enabled }}
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: {{ include "spectoncr.fullname" . }}-registry
                port:
                  name: http
          {{- end }}
          {{- if .Values.ingress.dashboard.enabled }}
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: {{ include "spectoncr.fullname" . }}-registry
                port:
                  name: http
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "spectoncr.fullname" . }}-registry
                port:
                  name: http
          {{- end }}
{{- end }}
