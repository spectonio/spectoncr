apiVersion: 1

# Postgres datasource for the enterprise dashboards
# (spectoncr-enterprise-{overview,detail}) which join scan / GC /
# usage tables for cost projection, image counts, and CVE exposure.
#
# Read-only role recommended in production; for the docker-compose
# stack we reuse the registry's main user since everything's local.
datasources:
  - name: spectoncr-postgres
    uid: spectoncr-postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: spectoncr
    secureJsonData:
      password: spectoncr
    jsonData:
      database: spectoncr
      sslmode: disable
      maxOpenConns: 4
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    editable: false
